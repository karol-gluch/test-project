                const used = user.plans.map(p => p.name);
                const suggestion = 'Trening ' + (suggestedLetters.find(l => !used.includes('Trening ' + l)) || (user.plans.length + 1));
                showTextInputModal({
                    title: 'Nowy plan', placeholder: 'np. Trening A', initialValue: suggestion, confirmLabel: 'Utwórz',
                    onSubmit: (name) => {
                        const plan = {id: uid(), name, exercises: []};
                        user.plans.push(plan);
                        save();
                        goto('planEditor', {planId: plan.id});
                    }
                });
            });
            document.querySelectorAll('[data-edit-plan]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    goto('planEditor', {planId: btn.getAttribute('data-edit-plan')});
                });
            });
            document.querySelectorAll('[data-delete-plan]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-delete-plan');
                    const plan = user.plans.find(p => p.id === id);
                    showConfirmModal({
                        title: 'Usunąć plan?',
                        message: 'Plan "' + plan.name + '" zostanie usunięty. Historia treningów pozostanie nienaruszona.',
                        confirmLabel: 'Usuń',
                        danger: true,
                        onConfirm: () => {
                            user.plans = user.plans.filter(p => p.id !== id);
                            save();
                            showToast('Plan usunięty');
                            goto('plans');
                        }
                    });
                });
            });
            document.querySelectorAll('[data-plan-card]').forEach(card => {
                card.addEventListener('click', () => goto('planEditor', {planId: card.getAttribute('data-plan-card')}));
            });
        }

        function renderPlanEditor(user, planId) {
            const plan = user.plans.find(p => p.id === planId);
            if (!plan) {
                return `<div class="empty-state"><div class="et1">Nie znaleziono planu</div></div>`;
            }
            return `
    <button class="btn btn-ghost" id="backToPlansBtn" style="padding-left:0;margin-bottom:6px;">${ICONS.chevronLeft} Plany</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <div class="view-title" style="margin-bottom:0;">${escapeHtml(plan.name)}</div>
      <button class="icon-btn" id="renamePlanBtn">${ICONS.pencil}</button>
    </div>
    <div class="view-sub">Ćwiczenia wykonywane w tym planie</div>
    <div class="section-label">Ćwiczenia (${plan.exercises.length})</div>
    ${plan.exercises.length ? `<div class="modal-list" style="max-height:none;">${plan.exercises.map((e, i) => `
      <div class="modal-list-item">
        <span>${escapeHtml(e)}</span>
        <button data-remove-plan-ex="${i}">${ICONS.trash}</button>
      </div>`).join('')}</div>` : `<div class="empty-state" style="padding:24px 16px;"><div class="et2">Dodaj pierwsze ćwiczenie do tego planu.</div></div>`}
    <button class="btn btn-secondary" id="addPlanExerciseBtn">${ICONS.plus} Dodaj ćwiczenie do planu</button>
  `;
        }

        function attachPlanEditorEvents(user, planId) {
            const plan = user.plans.find(p => p.id === planId);
            if (!plan) return;
            document.getElementById('backToPlansBtn').addEventListener('click', () => goto('plans'));
            document.getElementById('renamePlanBtn').addEventListener('click', () => {
                showTextInputModal({
                    title: 'Zmień nazwę planu', initialValue: plan.name, confirmLabel: 'Zapisz',
                    onSubmit: (name) => {
                        plan.name = name;
                        save();
                        goto('planEditor', {planId});
                    }
                });
            });
            document.getElementById('addPlanExerciseBtn').addEventListener('click', () => {
                showExercisePickerModal({
                    user, existingNames: plan.exercises,
                    onSubmit: (name) => {
                        plan.exercises.push(name);
                        save();
                        goto('planEditor', {planId});
                    }
                });
            });
            document.querySelectorAll('[data-remove-plan-ex]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-remove-plan-ex'), 10);
                    plan.exercises.splice(idx, 1);
                    save();
                    goto('planEditor', {planId});
                });
            });
        }

        /* ============================================================
       HISTORY
    ============================================================ */
        function renderHistoryView(user) {
            let html = `<div class="view-title">Historia</div><div class="view-sub">${user.history.length} zapisanych treningów</div>`;
            if (!user.history.length) {
                html += `<div class="empty-state"><div class="icon-wrap">${ICONS.history}</div><div class="et1">Brak historii</div><div class="et2">Ukończone treningi pojawią się tutaj.</div></div>`;
            } else {
                html += user.history.map(s => renderHistoryCard(s)).join('');
            }
            return html;
        }

        function attachHistoryEvents(user) {
            document.querySelectorAll('[data-history-item]').forEach(el => {
                el.addEventListener('click', () => goto('historyDetail', {sessionId: el.getAttribute('data-history-item')}));
            });
        }

        function renderHistoryDetail(user, sessionId) {
            const s = user.history.find(h => h.id === sessionId);
            if (!s) {
                return `<div class="empty-state"><div class="et1">Nie znaleziono treningu</div></div>`;
            }
            const totalSets = s.exercises.reduce((a, e) => a + e.sets.length, 0);
            return `
    <button class="btn btn-ghost" id="backToHistoryBtn" style="padding-left:0;margin-bottom:6px;">${ICONS.chevronLeft} Historia</button>
    <div class="view-title">${escapeHtml(s.planName || 'Trening dowolny')}</div>
    <div class="view-sub">${fmtDateLong(s.date)} · ${s.exercises.length} ćwiczeń · ${totalSets} serii</div>
    ${s.exercises.map(ex => `
      <div class="detail-ex-card">
        <div class="detail-ex-name">${escapeHtml(ex.name)}</div>
        ${ex.sets.map((st, i) => `
          <div class="detail-set-line">
            <span class="lbl">Seria ${i + 1}</span>
            <span class="val mono">${st.reps} powt. × ${st.weight} kg</span>
          </div>`).join('')}
      </div>`).join('')}
    <button class="btn btn-danger" id="deleteSessionBtn" style="margin-top:8px;">${ICONS.trash} Usuń ten trening</button>
  `;
        }

        function attachHistoryDetailEvents(user, sessionId) {
            document.getElementById('backToHistoryBtn').addEventListener('click', () => goto('history'));
            document.getElementById('deleteSessionBtn').addEventListener('click', () => {
                showConfirmModal({
                    title: 'Usunąć trening?', message: 'Ten wpis historii zostanie trwale usunięty.',
                    confirmLabel: 'Usuń', danger: true,
                    onConfirm: () => {
                        const s = user.history.find(h => h.id === sessionId);
                        if (s) {
                            const sYear = new Date(s.date + 'T00:00:00').getFullYear();
                            if (sYear === user.yearlyCountYear && user.yearlyCount > 0) {
                                user.yearlyCount -= 1;
                            }
                        }
                        user.history = user.history.filter(h => h.id !== sessionId);
                        save();
                        showToast('Trening usunięty');
                        goto('history');
                    }
                });
            });
        }

        /* ============================================================
       SETTINGS
    ============================================================ */
        function renderSettingsView(user) {
            return `
    <div class="view-title">Ustawienia</div>
    <div class="view-sub">Zarządzaj użytkownikami i danymi</div>

    <div class="section-label">Użytkownicy</div>
    ${state.users.map(u => `
      <div class="user-row">
        <div class="user-row-left">
          <div class="avatar">${escapeHtml(u.name.charAt(0).toUpperCase())}</div>
          <div>
            <div class="user-row-name">${escapeHtml(u.name)}</div>
            ${u.id === user.id ? `<span class="user-row-tag">Aktywny</span>` : `<span class="mono" style="font-size:11px;color:var(--text-faint);">${u.history.length} treningów</span>`}
          </div>
        </div>
        <div class="user-row-actions">
          <button class="icon-btn" data-rename-user="${u.id}">${ICONS.pencil}</button>
          <button class="icon-btn danger" data-delete-user="${u.id}">${ICONS.trash}</button>
        </div>
      </div>`).join('')}
    <button class="btn btn-secondary" id="addUserBtn2" style="margin-bottom:10px;">${ICONS.plus} Dodaj użytkownika</button>

    <div class="section-label">Statystyki</div>
    <div class="settings-item">
      <div class="settings-item-text">
        <div class="t1">Treningi w ${currentYear()} roku</div>
        <div class="t2">${escapeHtml(user.name)} — <span class="mono">${user.yearlyCount}</span> ukończonych</div>
      </div>
      <button class="icon-btn" id="resetCountBtn2">${ICONS.reset}</button>
    </div>

    <div class="section-label">Kopia zapasowa i przenoszenie danych</div>
    <div class="settings-item">
      <div class="settings-item-text">
        <div class="t1">Eksportuj wszystkie dane</div>
        <div class="t2">Zapisz plik .json ze wszystkimi użytkownikami, planami i historią</div>
      </div>
      <button class="icon-btn" id="exportJsonBtn" title="Eksportuj JSON">${ICONS.download}</button>
    </div>
    <div class="settings-item">
      <div class="settings-item-text">
        <div class="t1">Importuj dane</div>
        <div class="t2">Wczytaj plik .json wyeksportowany z innego urządzenia</div>
      </div>
      <button class="icon-btn" id="importJsonBtn" title="Importuj JSON">${ICONS.upload}</button>
      <input type="file" id="importJsonInput" accept="application/json,.json" style="display:none;">
    </div>
    <div class="settings-item">
      <div class="settings-item-text">
        <div class="t1">Eksportuj historię (CSV)</div>
        <div class="t2">Historia "${escapeHtml(user.name)}" jako arkusz do Excela / Arkuszy Google</div>
      </div>
      <button class="icon-btn" id="exportCsvBtn" title="Eksportuj CSV">${ICONS.fileText}</button>
    </div>

    <div class="danger-zone">
      <div class="section-label">Strefa niebezpieczna</div>
      <div class="settings-item-text" style="margin-bottom:12px;">
        <div class="t2">Usunięcie użytkownika kasuje trwale wszystkie jego plany, historię i licznik treningów. Import danych może nadpisać użytkowników o tej samej nazwie.</div>
      </div>
    </div>

    <div class="about-foot">GYMTRACK · Dziennik treningowy<br>Dane przechowywane lokalnie w tej przeglądarce</div>
  `;
        }

        function attachSettingsEvents(user) {
            document.getElementById('addUserBtn2').addEventListener('click', () => {
                showTextInputModal({
                    title: 'Nowy użytkownik', placeholder: 'Imię', confirmLabel: 'Dodaj',
                    onSubmit: (name) => {
                        const u = makeUser(name);
                        state.users.push(u);
                        state.currentUserId = u.id;
                        save();
                        showToast('Dodano użytkownika ' + name);
                        goto('dashboard');
                    }
                });
            });
            document.getElementById('resetCountBtn2').addEventListener('click', () => {
                showConfirmModal({
                    title: 'Zresetować licznik?',
                    message: 'Liczba treningów w ' + currentYear() + ' roku zostanie ustawiona na 0.',
                    confirmLabel: 'Resetuj', danger: true,
                    onConfirm: () => {
                        user.yearlyCount = 0;
                        user.yearlyCountYear = currentYear();
                        save();
                        showToast('Licznik zresetowany');
                        goto('settings');
                    }
                });
            });
            document.querySelectorAll('[data-rename-user]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-rename-user');
                    const u = state.users.find(x => x.id === id);
                    showTextInputModal({
                        title: 'Zmień imię', initialValue: u.name, confirmLabel: 'Zapisz',
                        onSubmit: (name) => {
                            u.name = name;
                            save();
                            goto('settings');
                        }
                    });
                });
            });
            document.querySelectorAll('[data-delete-user]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.getAttribute('data-delete-user');
                    const u = state.users.find(x => x.id === id);
                    showConfirmModal({
                        title: 'Usunąć użytkownika?',
                        message: 'Wszystkie dane użytkownika "' + u.name + '" (plany, historia, licznik) zostaną trwale usunięte.',
                        confirmLabel: 'Usuń', danger: true,
                        onConfirm: () => {
                            state.users = state.users.filter(x => x.id !== id);
                            if (state.currentUserId === id) {
                                state.currentUserId = state.users.length ? state.users[0].id : null;
                            }
                            save();
                            showToast('Użytkownik usunięty');
                            render();
                        }
                    });
                });
            });

            document.getElementById('exportJsonBtn').addEventListener('click', () => exportAllDataJson());
            document.getElementById('exportCsvBtn').addEventListener('click', () => exportHistoryCsv(user));
            const importInput = document.getElementById('importJsonInput');
            document.getElementById('importJsonBtn').addEventListener('click', () => importInput.click());
            importInput.addEventListener('change', () => {
                const file = importInput.files && importInput.files[0];
                if (!file) return;
                handleImportFile(file);
                importInput.value = '';
            });
        }

        /* ============================================================
       EKSPORT / IMPORT DANYCH
    ============================================================ */
        function triggerDownload(filename, content, mime) {
            const blob = new Blob([content], {type: mime});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function exportAllDataJson() {
            const payload = {
                app: 'gymtrack', exportedAt: new Date().toISOString(), version: 1,
                users: state.users
            };
            const stamp = todayISO();
            triggerDownload('gymtrack-kopia-' + stamp + '.json', JSON.stringify(payload, null, 2), 'application/json');
            showToast('Wyeksportowano dane do pliku JSON');
        }

        function csvEscape(val) {
            const s = String(val === undefined || val === null ? '' : val);
            if (/[";\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
            return s;
        }

        function exportHistoryCsv(user) {
            const rows = [['Data', 'Plan', 'Ćwiczenie', 'Seria', 'Powtórzenia', 'Obciążenie (kg)']];
            user.history.forEach(s => {
                s.exercises.forEach(ex => {
                    ex.sets.forEach((st, i) => {
                        rows.push([s.date, s.planName || 'Trening dowolny', ex.name, i + 1, st.reps, st.weight]);
                    });
                });
            });
            const csv = rows.map(r => r.map(csvEscape).join(';')).join('\r\n');
            const stamp = todayISO();
            triggerDownload('gymtrack-historia-' + user.name.replace(/\s+/g, '_') + '-' + stamp + '.csv', '\uFEFF' + csv, 'text/csv;charset=utf-8');
            showToast('Wyeksportowano historię do pliku CSV');
        }

        function isValidImportedUser(u) {
            return u && typeof u.name === 'string' && Array.isArray(u.plans) && Array.isArray(u.history);
        }

        function handleImportFile(file) {
            const reader = new FileReader();
            reader.onload = () => {
                let data;
                try {
                    data = JSON.parse(reader.result);
                } catch (e) {
                    showToast('Nieprawidłowy plik JSON');
                    return;
                }
                const importedUsers = Array.isArray(data.users) ? data.users : (Array.isArray(data) ? data : null);
                if (!importedUsers || !importedUsers.length || !importedUsers.every(isValidImportedUser)) {
                    showToast('Plik nie zawiera poprawnych danych GYMTRACK');
                    return;
                }
                const existingNames = state.users.map(u => u.name.trim().toLowerCase());
                const overlapping = importedUsers.filter(u => existingNames.includes(u.name.trim().toLowerCase()));
                const message = overlapping.length
                    ? 'Zaimportowanych zostanie ' + importedUsers.length + ' użytkowników. Uwaga: ' + overlapping.map(u => u.name).join(', ') + ' — dane zostaną nadpisane danymi z pliku.'
                    : 'Zaimportowanych zostanie ' + importedUsers.length + ' użytkowników do tej przeglądarki.';
                showConfirmModal({
                    title: 'Zaimportować dane?', message, confirmLabel: 'Importuj',
                    onConfirm: () => {
                        importedUsers.forEach(iu => {
                            const nameLc = iu.name.trim().toLowerCase();
                            const existingIdx = state.users.findIndex(u => u.name.trim().toLowerCase() === nameLc);
                            const cleanUser = {
                                id: (existingIdx >= 0 ? state.users[existingIdx].id : (iu.id || uid())),
                                name: iu.name,
                                yearlyCount: typeof iu.yearlyCount === 'number' ? iu.yearlyCount : 0,
                                yearlyCountYear: typeof iu.yearlyCountYear === 'number' ? iu.yearlyCountYear : currentYear(),
                                plans: Array.isArray(iu.plans) ? iu.plans : [],
                                history: Array.isArray(iu.history) ? iu.history : [],
                                activeSession: iu.activeSession || null,
                                exerciseLibrary: Array.isArray(iu.exerciseLibrary) ? iu.exerciseLibrary : []
                            };
                            if (existingIdx >= 0) {
                                state.users[existingIdx] = cleanUser;
                            } else {
                                state.users.push(cleanUser);
                            }
                        });
                        state.currentUserId = state.users[0].id;
                        save();
                        showToast('Dane zaimportowane pomyślnie');
                        goto('dashboard');
                    }
                });
            };
            reader.onerror = () => showToast('Nie udało się odczytać pliku');
            reader.readAsText(file);
        }

        /* ============================================================
       INIT
    ============================================================ */
        load();
        render();

    })();
</script>
</body>
</html>
