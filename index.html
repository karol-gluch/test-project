<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#14161a">
    <title>GYMTRACK — Dziennik treningowy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <style>
        /* ============ RESET & TOKENS ============ */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #101216;
            --bg-page: #0a0b0d;
            --bg-soft: #191c22;
            --card: #1d2129;
            --card-hover: #242933;
            --border: #2b303a;
            --border-soft: #22262e;
            --text: #f3f1ea;
            --text-dim: #9aa0ac;
            --text-faint: #5c6270;
            --primary: #3b5bff;
            --primary-dim: #2842c9;
            --primary-soft: rgba(59, 91, 255, 0.16);
            --accent: #ffd23f;
            --accent-soft: rgba(255, 210, 63, 0.16);
            --danger: #e8483a;
            --danger-soft: rgba(232, 72, 58, 0.14);
            --success: #3bb273;
            --success-soft: rgba(59, 178, 115, 0.14);
            --plate-red: #e8483a;
            --plate-blue: #4c86ff;
            --plate-yellow: #ffc93c;
            --plate-green: #3bb273;
            --radius-sm: 9px;
            --radius: 14px;
            --radius-lg: 22px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.28);
            --font-display: 'Bebas Neue', Impact, sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-mono: 'JetBrains Mono', 'Courier New', monospace;
            --container-w: 480px;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            color: var(--text);
            line-height: 1.45;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        button, input, select, textarea {
            font-family: inherit;
            color: inherit;
        }

        button {
            cursor: pointer;
            background: none;
            border: none;
        }

        input, select {
            background: none;
            border: none;
            outline: none;
        }

        ::selection {
            background: var(--primary-soft);
        }

        .mono {
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums;
        }

        .hidden {
            display: none !important;
        }

        /* ============ APP SHELL ============ */
        #app {
            max-width: var(--container-w);
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
            isolation: isolate;
        }

        @media (min-width: 560px) {
            body {
                background: radial-gradient(circle at 20% 10%, rgba(59, 91, 255, 0.10), transparent 45%),
                radial-gradient(circle at 80% 90%, rgba(255, 210, 63, 0.06), transparent 45%),
                var(--bg-page);
                padding: 32px 16px;
            }

            #app {
                min-height: calc(100vh - 64px);
                border-radius: 28px;
                box-shadow: var(--shadow), 0 0 0 1px var(--border-soft);
                overflow: hidden;
            }
        }

        /* ============ HEADER ============ */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(16, 18, 22, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-soft);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand .logo-mark {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex-shrink: 0;
        }

        .brand .logo-mark svg {
            width: 18px;
            height: 18px;
        }

        .brand-text {
            font-family: var(--font-display);
            font-size: 22px;
            letter-spacing: 1.5px;
            line-height: 1;
        }

        .user-switcher {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .user-select-wrap {
            position: relative;
        }

        .user-select-wrap select {
            appearance: none;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 30px 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            max-width: 120px;
            text-overflow: ellipsis;
        }

        .user-select-wrap::after {
            content: "";
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            border-right: 2px solid var(--text-dim);
            border-bottom: 2px solid var(--text-dim);
            transform: translateY(-70%) rotate(45deg);
            pointer-events: none;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            flex-shrink: 0;
            transition: background .15s, transform .1s;
        }

        .icon-btn:active {
            transform: scale(0.92);
        }

        .icon-btn:hover {
            background: var(--card-hover);
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
        }

        .icon-btn.danger {
            color: var(--danger);
        }

        .icon-btn.primary-fill {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ============ MAIN ============ */
        .main-content {
            flex: 1;
            padding: 18px 16px 28px;
            animation: fadeIn .25s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .view-title {
            font-family: var(--font-display);
            font-size: 30px;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .view-sub {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 18px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-faint);
            margin: 22px 0 10px;
        }

        .section-label:first-child {
            margin-top: 0;
        }

        /* ============ BOTTOM NAV ============ */
        .bottom-nav {
            position: sticky;
            bottom: 0;
            z-index: 20;
            display: flex;
            background: rgba(16, 18, 22, 0.92);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-soft);
            padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
        }

        .bottom-nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 2px;
            border-radius: 12px;
            color: var(--text-faint);
            font-size: 10.5px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: color .15s;
            position: relative;
        }

        .bottom-nav button svg {
            width: 21px;
            height: 21px;
        }

        .bottom-nav button.active {
            color: var(--primary);
        }

        .bottom-nav button .nav-dot {
            position: absolute;
            top: 2px;
            right: calc(50% - 16px);
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 2px var(--bg);
        }

        /* ============ CARDS / BUTTONS ============ */
        .card {
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 13px 20px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 14.5px;
            letter-spacing: 0.2px;
            width: 100%;
            transition: transform .1s, opacity .15s, background .15s;
            border: 1px solid transparent;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn svg {
            width: 17px;
            height: 17px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #5f4cff);
            color: #fff;
            box-shadow: 0 6px 18px rgba(59, 91, 255, 0.35);
        }

        .btn-primary:hover {
            filter: brightness(1.08);
        }

        .btn-secondary {
            background: var(--card-hover);
            color: var(--text);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(232, 72, 58, 0.24);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-dim);
            width: auto;
            padding: 10px 14px;
        }

        .btn-sm {
            padding: 9px 14px;
            font-size: 13px;
            width: auto;
        }

        .btn-block-row {
            display: flex;
            gap: 10px;
        }

        .btn-block-row .btn {
            width: auto;
            flex: 1;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 13px;
            border-radius: 999px;
            font-size: 12.5px;
            font-weight: 600;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* ============ DASHBOARD ============ */
        .greeting {
            font-family: var(--font-display);
            font-size: 32px;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .greeting-date {
            color: var(--text-dim);
            font-size: 13.5px;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .count-widget {
            background: linear-gradient(150deg, #1a2038 0%, var(--card) 65%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 18px;
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
        }

        .count-widget::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 90% -10%, rgba(59, 91, 255, 0.35), transparent 55%);
            pointer-events: none;
        }

        .count-widget-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
        }

        .count-widget-label {
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .count-widget-num {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 56px;
            line-height: 1;
            margin-top: 8px;
            color: var(--text);
            position: relative;
        }

        .count-widget-num span {
            font-size: 20px;
            color: var(--text-dim);
            font-weight: 600;
            margin-left: 4px;
        }

        .barbell {
            display: flex;
            align-items: center;
            margin-top: 16px;
            position: relative;
            height: 26px;
        }

        .barbell-bar {
            flex: 1;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            position: relative;
        }

        .barbell-plate {
            width: 6px;
            height: 26px;
            border-radius: 2px;
            margin: 0 1.5px;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .barbell-plate.big {
            width: 9px;
            height: 26px;
        }

        /* ============ ACTIVE SESSION BANNER ============ */
        .active-session-card {
            background: linear-gradient(135deg, var(--primary-soft), transparent);
            border: 1px solid var(--primary-dim);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .active-session-card .pulse {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 0 rgba(59, 178, 115, 0.6);
            animation: pulse 1.8s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(59, 178, 115, 0.55);
            }
            70% {
                box-shadow: 0 0 0 8px rgba(59, 178, 115, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(59, 178, 115, 0);
            }
        }

        .active-session-text .t1 {
            font-weight: 700;
            font-size: 14.5px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .active-session-text .t2 {
            font-size: 12.5px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* ============ PLAN PICKER ============ */
        .plan-pick-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 10px;
            transition: background .15s, border-color .15s;
        }

        .plan-pick-card:active {
            background: var(--card-hover);
        }

        .plan-pick-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .plan-pick-badge {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 17px;
            background: var(--bg-soft);
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .plan-pick-name {
            font-weight: 700;
            font-size: 15px;
        }

        .plan-pick-sub {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ============ EXERCISE CARD (session) ============ */
        .exercise-card {
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-left: 3px solid var(--plate-red);
            border-radius: var(--radius);
            padding: 14px 14px 12px;
            margin-bottom: 12px;
        }

        .exercise-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 2px;
        }

        .exercise-name {
            font-weight: 700;
            font-size: 15.5px;
        }

        .exercise-last {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 3px;
        }

        .exercise-last .mono {
            color: var(--text-dim);
        }

        .exercise-last.pr {
            color: var(--accent);
        }

        .sets-table {
            margin-top: 12px;
        }

        .sets-head-row, .set-row {
            display: grid;
            grid-template-columns:26px 1fr 1fr 30px;
            gap: 8px;
            align-items: center;
        }

        .sets-head-row {
            font-size: 10.5px;
            color: var(--text-faint);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-weight: 700;
            padding: 0 2px 6px;
        }

        .set-row {
            margin-bottom: 7px;
        }

        .set-idx {
            font-family: var(--font-mono);
            font-size: 12.5px;
            color: var(--text-dim);
            width: 26px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-soft);
            border-radius: 8px;
            font-weight: 600;
        }

        .set-input-wrap {
            position: relative;
        }

        .set-input {
            width: 100%;
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 8px;
            font-family: var(--font-mono);
            font-size: 14.5px;
            font-weight: 600;
            text-align: center;
            transition: border-color .15s, background .15s;
        }

        .set-input:focus {
            border-color: var(--primary);
            background: var(--bg);
        }

        .set-input::placeholder {
            color: var(--text-faint);
            font-weight: 500;
        }

        .set-remove {
            width: 30px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-faint);
            border-radius: 8px;
        }

        .set-remove:active {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .set-remove svg {
            width: 15px;
            height: 15px;
        }

        .add-set-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
            padding: 8px 4px;
            margin-top: 2px;
        }

        .add-set-btn svg {
            width: 15px;
            height: 15px;
        }

        .exercise-remove {
            color: var(--text-faint);
        }

        .exercise-remove:active {
            color: var(--danger);
        }

        .exercise-remove svg {
            width: 16px;
            height: 16px;
        }

        .session-footer {
            position: sticky;
            bottom: 0;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
            padding-top: 14px;
            margin-top: 6px;
        }

        /* ============ PLANS LIST ============ */
        .plan-card {
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }

        .plan-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .plan-card-name {
            font-family: var(--font-display);
            font-size: 21px;
            letter-spacing: 0.5px;
        }

        .plan-card-actions {
            display: flex;
            gap: 6px;
        }

        .plan-card-empty {
            color: var(--text-faint);
            font-size: 13px;
            font-style: italic;
        }

        /* ============ HISTORY ============ */
        .history-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .history-date-box {
            width: 46px;
            flex-shrink: 0;
            text-align: center;
            background: var(--bg-soft);
            border-radius: 10px;
            padding: 6px 0;
            border: 1px solid var(--border);
        }

        .history-date-day {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 17px;
            line-height: 1;
        }

        .history-date-mon {
            font-size: 9.5px;
            text-transform: uppercase;
            color: var(--text-faint);
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-plan {
            font-weight: 700;
            font-size: 14.5px;
        }

        .history-meta {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 2px;
        }

        .history-chev {
            color: var(--text-faint);
            flex-shrink: 0;
        }

        .history-chev svg {
            width: 16px;
            height: 16px;
        }

        .detail-ex-card {
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-left: 3px solid var(--plate-blue);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 10px;
        }

        .detail-ex-name {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 8px;
        }

        .detail-set-line {
            display: flex;
            justify-content: space-between;
            font-size: 13.5px;
            padding: 5px 0;
            border-bottom: 1px dashed var(--border-soft);
        }

        .detail-set-line:last-child {
            border-bottom: none;
        }

        .detail-set-line .lbl {
            color: var(--text-dim);
        }

        .detail-set-line .val {
            font-family: var(--font-mono);
            font-weight: 600;
        }

        /* ============ SETTINGS ============ */
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 10px;
        }

        .user-row-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
        }

        .user-row-name {
            font-weight: 700;
            font-size: 14.5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .user-row-tag {
            font-size: 11px;
            color: var(--primary);
            font-weight: 700;
            background: var(--primary-soft);
            padding: 2px 8px;
            border-radius: 999px;
            display: inline-block;
            margin-top: 3px;
        }

        .user-row-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .settings-item-text .t1 {
            font-weight: 700;
            font-size: 14px;
        }

        .settings-item-text .t2 {
            font-size: 12px;
            color: var(--text-faint);
            margin-top: 2px;
        }

        .danger-zone {
            border: 1px solid var(--danger-soft);
            background: rgba(232, 72, 58, 0.05);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-top: 22px;
        }

        .danger-zone .section-label {
            color: var(--danger);
            margin-top: 0;
        }

        .about-foot {
            text-align: center;
            color: var(--text-faint);
            font-size: 11.5px;
            margin-top: 28px;
            line-height: 1.7;
        }

        /* ============ EMPTY STATE ============ */
        .empty-state {
            text-align: center;
            padding: 40px 16px;
            color: var(--text-dim);
        }

        .empty-state .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 14px;
            color: var(--text-faint);
        }

        .empty-state .icon-wrap svg {
            width: 26px;
            height: 26px;
        }

        .empty-state .et1 {
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .empty-state .et2 {
            font-size: 13px;
            max-width: 280px;
            margin: 0 auto;
        }

        /* onboarding */
        .onboard-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
        }

        .onboard-logo {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(59, 91, 255, 0.35);
        }

        .onboard-logo svg {
            width: 36px;
            height: 36px;
        }

        .onboard-title {
            font-family: var(--font-display);
            font-size: 38px;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .onboard-sub {
            color: var(--text-dim);
            font-size: 14.5px;
            margin-bottom: 28px;
            max-width: 300px;
        }

        .onboard-form {
            width: 100%;
            max-width: 320px;
        }

        .onboard-form input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
        }

        .onboard-form input:focus {
            border-color: var(--primary);
        }

        /* ============ MODAL ============ */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(6, 7, 9, 0.6);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: fadeIn .2s ease;
        }

        @media (min-width: 560px) {
            .modal-backdrop {
                align-items: center;
            }
        }

        .modal-box {
            width: 100%;
            max-width: var(--container-w);
            background: var(--bg-soft);
            border: 1px solid var(--border);
            border-radius: 22px 22px 0 0;
            padding: 22px 20px calc(22px + env(safe-area-inset-bottom));
            animation: slideUp .25s cubic-bezier(.2, .8, .2, 1);
        }

        @media (min-width: 560px) {
            .modal-box {
                border-radius: 22px;
                margin: 16px;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-title {
            font-family: var(--font-display);
            font-size: 22px;
            letter-spacing: 0.4px;
            margin-bottom: 4px;
        }

        .modal-msg {
            font-size: 13.5px;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .modal-box input[type=text], .modal-box input[type=number] {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 14px;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .modal-box input:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .modal-actions .btn {
            flex: 1;
        }

        .modal-list {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .modal-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--card);
            border-radius: 10px;
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
        }

        .modal-list-item button {
            color: var(--text-faint);
        }

        .modal-list-item button:active {
            color: var(--danger);
        }

        .modal-list-item button svg {
            width: 15px;
            height: 15px;
        }

        .datalist-hint {
            font-size: 11.5px;
            color: var(--text-faint);
            margin: -8px 0 12px;
        }

        /* ============ TOAST ============ */
        .toast {
            position: fixed;
            left: 50%;
            bottom: calc(var(--nav-h, 76px) + 14px);
            transform: translateX(-50%) translateY(20px);
            background: var(--text);
            color: var(--bg);
            font-weight: 700;
            font-size: 13.5px;
            padding: 11px 20px;
            border-radius: 999px;
            box-shadow: var(--shadow);
            z-index: 200;
            opacity: 0;
            transition: opacity .25s, transform .25s;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ============ CONGRATS OVERLAY ============ */
        .congrats-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(8, 9, 12, 0.82);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            animation: fadeIn .3s ease;
            overflow: hidden;
        }

        .congrats-card {
            background: linear-gradient(160deg, #1c2138, var(--bg-soft) 60%);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 36px 26px 28px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            position: relative;
            z-index: 2;
            animation: popIn .4s cubic-bezier(.2, .9, .3, 1.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        @keyframes popIn {
            from {
                transform: scale(.85);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .congrats-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent), #ff9f3f);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1305;
            box-shadow: 0 8px 24px rgba(255, 210, 63, 0.4);
            animation: iconBounce .6s ease .1s both;
        }

        @keyframes iconBounce {
            0% {
                transform: scale(0) rotate(-30deg);
            }
            60% {
                transform: scale(1.15) rotate(8deg);
            }
            100% {
                transform: scale(1) rotate(0);
            }
        }

        .congrats-icon svg {
            width: 32px;
            height: 32px;
        }

        .congrats-title {
            font-family: var(--font-display);
            font-size: 28px;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .congrats-msg {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 18px;
        }

        .congrats-count {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 44px;
            color: var(--accent);
            line-height: 1;
        }

        .congrats-count-label {
            font-size: 11px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-faint);
            font-weight: 700;
            margin-top: 6px;
            margin-bottom: 22px;
        }

        .confetti-piece {
            position: absolute;
            top: -10px;
            width: 7px;
            height: 12px;
            opacity: 0.9;
            animation: confettiFall linear forwards;
            z-index: 1;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(110vh) rotate(540deg);
                opacity: 0.2;
            }
        }

        /* misc */
        .spacer-nav {
            height: 6px;
        }

        textarea:focus, input:focus {
            outline: none;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }
    </style>
</head>
<body>

<div id="app"></div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>
<div id="congratsRoot"></div>

<script>
    (function () {
        "use strict";

        /* ============================================================
       ICONS
    ============================================================ */
        const ICONS = {
            dumbbell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 17.5 17.5"/><path d="M4 4l2.5 2.5"/><path d="M17.5 17.5 20 20"/><rect x="2" y="7" width="4" height="4" rx="1"/><rect x="2.8" y="7.8" width="2.4" height="2.4" rx=".5"/><rect x="18" y="13" width="4" height="4" rx="1"/><rect x="18.8" y="13.8" width="2.4" height="2.4" rx=".5"/><path d="M8.5 4.5 4.5 8.5"/><path d="M19.5 15.5 15.5 19.5"/></svg>',
            home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>',
            play: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 4.5v15l13-7.5-13-7.5Z"/></svg>',
            clipboard: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M9 11h6"/><path d="M9 15h6"/></svg>',
            history: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 8v5l3 2"/></svg>',
            settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>',
            plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
            trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/><path d="M18 7l-.9 13a2 2 0 0 1-2 1.9H8.9a2 2 0 0 1-2-1.9L6 7"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>',
            pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
            chevronLeft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>',
            chevronRight: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>',
            x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>',
            check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
            trophy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v6a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 5"/><path d="M17 5h3a3 3 0 0 1-3 5"/></svg>',
            reset: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.3"/><path d="M3 4v5h5"/></svg>',
            download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="M7 11l5 5 5-5"/><path d="M5 21h14"/></svg>',
            upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V8"/><path d="M7 13l5-5 5 5"/><path d="M5 3h14"/></svg>',
            fileText: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6"/><path d="M9 17h6"/></svg>',
            flag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v18"/><path d="M5 4h11l-2 4 2 4H5"/></svg>',
            user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>',
        };
        const PLATE_COLORS = ['var(--plate-red)', 'var(--plate-blue)', 'var(--plate-yellow)', 'var(--plate-green)'];

        /* ============================================================
       STATE
    ============================================================ */
        const STORAGE_KEY = 'gymtrack_state_v1';
        let state = null;

        function uid() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
        }

        function currentYear() {
            return new Date().getFullYear();
        }

        function todayISO() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function defaultState() {
            return {currentUserId: null, view: 'dashboard', viewParams: {}, users: []};
        }

        function makeUser(name) {
            return {
                id: uid(), name: name.trim(),
                yearlyCount: 0, yearlyCountYear: currentYear(),
                plans: [], history: [], activeSession: null, exerciseLibrary: []
            };
        }

        function load() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    state = JSON.parse(raw);
                } else {
                    state = defaultState();
                }
            } catch (e) {
                state = defaultState();
            }
            if (!state.users) state.users = [];
            if (!state.view) state.view = 'dashboard';
            if (!state.viewParams) state.viewParams = {};
            state.users.forEach(u => {
                if (u.yearlyCountYear !== currentYear()) {
                    u.yearlyCountYear = currentYear();
                    u.yearlyCount = 0;
                }
                if (!u.exerciseLibrary) u.exerciseLibrary = [];
                if (!u.plans) u.plans = [];
                if (!u.history) u.history = [];
            });
            if (state.currentUserId && !state.users.find(u => u.id === state.currentUserId)) {
                state.currentUserId = state.users.length ? state.users[0].id : null;
            }
            if (!state.currentUserId && state.users.length) {
                state.currentUserId = state.users[0].id;
            }
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function getUser() {
            return state.users.find(u => u.id === state.currentUserId) || null;
        }

        function goto(view, params) {
            state.view = view;
            state.viewParams = params || {};
            save();
            render();
            window.scrollTo(0, 0);
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>"']/g, c => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[c]));
        }

        function fmtDateShort(iso) {
            const d = new Date(iso + 'T00:00:00');
            const months = ['STY', 'LUT', 'MAR', 'KWI', 'MAJ', 'CZE', 'LIP', 'SIE', 'WRZ', 'PAŹ', 'LIS', 'GRU'];
            return {day: String(d.getDate()).padStart(2, '0'), mon: months[d.getMonth()]};
        }

        function fmtDateLong(iso) {
            const d = new Date(iso + 'T00:00:00');
            return d.toLocaleDateString('pl-PL', {day: 'numeric', month: 'long', year: 'numeric'});
        }

        /* ============================================================
       TOAST
    ============================================================ */
        let toastTimer = null;

        function showToast(msg) {
            const root = document.getElementById('toastRoot');
            root.innerHTML = '<div class="toast" id="toastEl">' + escapeHtml(msg) + '</div>';
            const el = document.getElementById('toastEl');
            requestAnimationFrame(() => el.classList.add('show'));
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                el.classList.remove('show');
            }, 2200);
        }

        /* ============================================================
       MODAL SYSTEM
    ============================================================ */
        function closeModal() {
            document.getElementById('modalRoot').innerHTML = '';
        }

        function showConfirmModal({title, message, confirmLabel, danger, onConfirm}) {
            const root = document.getElementById('modalRoot');
            root.innerHTML = `
    <div class="modal-backdrop" id="mdBackdrop">
      <div class="modal-box">
        <div class="modal-title">${escapeHtml(title)}</div>
        <div class="modal-msg">${escapeHtml(message)}</div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="mdCancel">Anuluj</button>
          <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" id="mdOk">${escapeHtml(confirmLabel || 'Potwierdź')}</button>
        </div>
      </div>
    </div>`;
            document.getElementById('mdCancel').onclick = closeModal;
            document.getElementById('mdBackdrop').addEventListener('click', e => {
                if (e.target.id === 'mdBackdrop') closeModal();
            });
            document.getElementById('mdOk').onclick = () => {
                closeModal();
                onConfirm();
            };
        }

        function showTextInputModal({title, message, placeholder, initialValue, confirmLabel, onSubmit}) {
            const root = document.getElementById('modalRoot');
            root.innerHTML = `
    <div class="modal-backdrop" id="mdBackdrop">
      <div class="modal-box">
        <div class="modal-title">${escapeHtml(title)}</div>
        ${message ? `<div class="modal-msg">${escapeHtml(message)}</div>` : ''}
        <form id="mdForm">
          <input type="text" id="mdInput" placeholder="${escapeHtml(placeholder || '')}" value="${escapeHtml(initialValue || '')}" autocomplete="off" />
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="mdCancel">Anuluj</button>
            <button type="submit" class="btn btn-primary" id="mdOk">${escapeHtml(confirmLabel || 'Zapisz')}</button>
          </div>
        </form>
      </div>
    </div>`;
            const input = document.getElementById('mdInput');
            document.getElementById('mdCancel').onclick = closeModal;
            document.getElementById('mdBackdrop').addEventListener('click', e => {
                if (e.target.id === 'mdBackdrop') closeModal();
            });
            document.getElementById('mdForm').addEventListener('submit', e => {
                e.preventDefault();
                const val = input.value.trim();
                if (!val) {
                    input.focus();
                    return;
                }
                closeModal();
                onSubmit(val);
            });
            setTimeout(() => {
                input.focus();
            }, 50);
        }

        function showExercisePickerModal({user, existingNames, onSubmit}) {
            const root = document.getElementById('modalRoot');
            const lib = (user.exerciseLibrary || []).filter(n => !existingNames.includes(n));
            root.innerHTML = `
    <div class="modal-backdrop" id="mdBackdrop">
      <div class="modal-box">
        <div class="modal-title">Dodaj ćwiczenie</div>
        <div class="modal-msg">Wpisz nazwę lub wybierz z listy wcześniejszych ćwiczeń.</div>
        <form id="mdForm">
          <input type="text" id="mdInput" placeholder="np. Wyciskanie sztangi" autocomplete="off" list="exLib" />
          <datalist id="exLib">${lib.map(n => `<option value="${escapeHtml(n)}"></option>`).join('')}</datalist>
          ${lib.length ? `<div class="chip-row" style="margin-bottom:14px;">${lib.slice(0, 10).map(n => `<button type="button" class="chip" data-pick="${escapeHtml(n)}">${escapeHtml(n)}</button>`).join('')}</div>` : ''}
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="mdCancel">Anuluj</button>
            <button type="submit" class="btn btn-primary">Dodaj</button>
          </div>
        </form>
      </div>
    </div>`;
            const input = document.getElementById('mdInput');
            document.getElementById('mdCancel').onclick = closeModal;
            document.getElementById('mdBackdrop').addEventListener('click', e => {
                if (e.target.id === 'mdBackdrop') closeModal();
            });
            root.querySelectorAll('[data-pick]').forEach(btn => {
                btn.addEventListener('click', () => {
                    closeModal();
                    onSubmit(btn.getAttribute('data-pick'));
                });
            });
            document.getElementById('mdForm').addEventListener('submit', e => {
                e.preventDefault();
                const val = input.value.trim();
                if (!val) {
                    input.focus();
                    return;
                }
                closeModal();
                onSubmit(val);
            });
            setTimeout(() => {
                input.focus();
            }, 50);
        }

        /* ============================================================
       CONGRATS OVERLAY
    ============================================================ */
        function showCongrats(count) {
            const root = document.getElementById('congratsRoot');
            const colors = ['var(--primary)', 'var(--accent)', 'var(--success)', 'var(--plate-red)', '#7c3aed'];
            let confetti = '';
            for (let i = 0; i < 26; i++) {
                const left = Math.random() * 100;
                const delay = Math.random() * 0.4;
                const dur = 2.2 + Math.random() * 1.6;
                const color = colors[i % colors.length];
                const rot = Math.random() > 0.5 ? '' : 'border-radius:50%;';
                confetti += `<span class="confetti-piece" style="left:${left}%;background:${color};animation-delay:${delay}s;animation-duration:${dur}s;${rot}"></span>`;
            }
            root.innerHTML = `
    <div class="congrats-overlay" id="congratsOv">
      ${confetti}
      <div class="congrats-card">
        <div class="congrats-icon">${ICONS.trophy}</div>
        <div class="congrats-title">Trening ukończony!</div>
        <div class="congrats-msg">Świetna robota. Odpoczywaj i regeneruj się.</div>
        <div class="congrats-count mono">${count}</div>
        <div class="congrats-count-label">Treningów w ${currentYear()} roku</div>
        <button class="btn btn-primary" id="congOk">Super, dzięki!</button>
      </div>
    </div>`;
            document.getElementById('congOk').onclick = () => {
                root.innerHTML = '';
            };
        }

        /* ============================================================
       RENDER: APP SHELL (header + nav)
    ============================================================ */
        function render() {
            const app = document.getElementById('app');
            if (!state.users.length) {
                app.innerHTML = renderOnboarding();
                attachOnboardingEvents();
                return;
            }
            const user = getUser();
            app.innerHTML = `
    ${renderHeader(user)}
    <main class="main-content" id="mainContent"></main>
    ${renderBottomNav()}
  `;
            attachHeaderEvents();
            document.getElementById('mainContent').innerHTML = renderView(user);
            attachViewEvents(user);
            attachNavEvents();
        }

        function renderHeader(user) {
            const options = state.users.map(u => `<option value="${u.id}" ${u.id === user.id ? 'selected' : ''}>${escapeHtml(u.name)}</option>`).join('');
            return `
    <header class="topbar">
      <div class="brand">
        <div class="logo-mark">${ICONS.dumbbell}</div>
        <div class="brand-text">GYMTRACK</div>
      </div>
      <div class="user-switcher">
        <div class="user-select-wrap">
          <select id="userSelect">${options}</select>
        </div>
        <button class="icon-btn" id="addUserBtn" title="Dodaj użytkownika">${ICONS.plus}</button>
      </div>
    </header>`;
        }

        function renderBottomNav() {
            const items = [
                {id: 'dashboard', label: 'Start', icon: ICONS.home},
                {id: 'session', label: 'Trening', icon: ICONS.play},
                {id: 'plans', label: 'Plany', icon: ICONS.clipboard},
                {id: 'history', label: 'Historia', icon: ICONS.history},
                {id: 'settings', label: 'Ustawienia', icon: ICONS.settings},
            ];
            const user = getUser();
            const activeView = ['session', 'planEditor'].includes(state.view) ? (state.view === 'planEditor' ? 'plans' : 'session') : (['historyDetail'].includes(state.view) ? 'history' : state.view);
            return `
    <nav class="bottom-nav">
      ${items.map(it => `
        <button data-nav="${it.id}" class="${activeView === it.id ? 'active' : ''}">
          ${it.id === 'session' && user && user.activeSession ? '<span class="nav-dot"></span>' : ''}
          ${it.icon}
          <span>${it.label}</span>
        </button>`).join('')}
    </nav>`;
        }

        function attachHeaderEvents() {
            const sel = document.getElementById('userSelect');
            if (sel) sel.addEventListener('change', () => {
                state.currentUserId = sel.value;
                goto('dashboard');
            });
            const addBtn = document.getElementById('addUserBtn');
            if (addBtn) addBtn.addEventListener('click', () => {
                showTextInputModal({
                    title: 'Nowy użytkownik', placeholder: 'Imię', confirmLabel: 'Dodaj',
                    onSubmit: (name) => {
                        const u = makeUser(name);
                        state.users.push(u);
                        state.currentUserId = u.id;
                        save();
                        showToast('Dodano użytkownika ' + name);
                        goto('dashboard');
                    }
                });
            });
        }

        function attachNavEvents() {
            document.querySelectorAll('[data-nav]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.getAttribute('data-nav');
                    goto(v);
                });
            });
        }

        /* ============================================================
       ONBOARDING
    ============================================================ */
        function renderOnboarding() {
            return `
    <div class="onboard-wrap">
      <div class="onboard-logo">${ICONS.dumbbell}</div>
      <div class="onboard-title">GYMTRACK</div>
      <div class="onboard-sub">Twój cyfrowy dziennik treningowy. Zapisuj serie, powtórzenia i obciążenie — trening po treningu.</div>
      <form class="onboard-form" id="onbForm">
        <input type="text" id="onbInput" placeholder="Twoje imię" autocomplete="off" />
        <button type="submit" class="btn btn-primary">${ICONS.plus} Rozpocznij</button>
      </form>
    </div>`;
        }

        function attachOnboardingEvents() {
            const form = document.getElementById('onbForm');
            form.addEventListener('submit', e => {
                e.preventDefault();
                const input = document.getElementById('onbInput');
                const val = input.value.trim();
                if (!val) {
                    input.focus();
                    return;
                }
                const u = makeUser(val);
                state.users.push(u);
                state.currentUserId = u.id;
                save();
                render();
            });
        }

        /* ============================================================
       VIEW ROUTER
    ============================================================ */
        function renderView(user) {
            switch (state.view) {
                case 'dashboard':
                    return renderDashboard(user);
                case 'session':
                    return renderSessionView(user);
                case 'plans':
                    return renderPlansView(user);
                case 'planEditor':
                    return renderPlanEditor(user, state.viewParams.planId);
                case 'history':
                    return renderHistoryView(user);
                case 'historyDetail':
                    return renderHistoryDetail(user, state.viewParams.sessionId);
                case 'settings':
                    return renderSettingsView(user);
                default:
                    return renderDashboard(user);
            }
        }

        function attachViewEvents(user) {
            switch (state.view) {
                case 'dashboard':
                    attachDashboardEvents(user);
                    break;
                case 'session':
                    attachSessionEvents(user);
                    break;
                case 'plans':
                    attachPlansEvents(user);
                    break;
                case 'planEditor':
                    attachPlanEditorEvents(user, state.viewParams.planId);
                    break;
                case 'history':
                    attachHistoryEvents(user);
                    break;
                case 'historyDetail':
                    attachHistoryDetailEvents(user, state.viewParams.sessionId);
                    break;
                case 'settings':
                    attachSettingsEvents(user);
                    break;
            }
        }

        /* ============================================================
       DASHBOARD
    ============================================================ */
        function renderDashboard(user) {
            const dateStr = new Date().toLocaleDateString('pl-PL', {weekday: 'long', day: 'numeric', month: 'long'});
            const plates = [];
            const n = Math.min(user.yearlyCount, 12);
            for (let i = 0; i < n; i++) plates.push(`<div class="barbell-plate ${i % 3 === 0 ? 'big' : ''}" style="background:${PLATE_COLORS[i % PLATE_COLORS.length]}"></div>`);

            let activeBanner = '';
            if (user.activeSession) {
                activeBanner = `
      <div class="active-session-card" id="resumeSessionCard">
        <div class="active-session-text">
          <div class="t1"><span class="pulse"></span> Aktywny trening</div>
          <div class="t2">${escapeHtml(user.activeSession.planName || 'Trening dowolny')} · ${user.activeSession.exercises.length} ćwicz.</div>
        </div>
        <button class="btn btn-primary btn-sm" id="resumeSessionBtn">Kontynuuj</button>
      </div>`;
            }

            const recent = user.history.slice(0, 3);
            let recentHtml = '';
            if (recent.length) {
                recentHtml = `
      <div class="section-label">Ostatnie treningi</div>
      ${recent.map(s => renderHistoryCard(s)).join('')}
      <button class="btn btn-ghost" id="seeAllHistoryBtn" style="margin:2px auto 0;display:flex;">Zobacz wszystkie ${ICONS.chevronRight}</button>
    `;
            }

            return `
    <div class="greeting">Cześć, ${escapeHtml(user.name)}</div>
    <div class="greeting-date">${dateStr}</div>

    <div class="count-widget">
      <div class="count-widget-top">
        <div>
          <div class="count-widget-label">Treningi w ${currentYear()}</div>
          <div class="count-widget-num mono">${user.yearlyCount}<span>/rok</span></div>
        </div>
        <button class="icon-btn" id="resetCountBtn" title="Resetuj licznik">${ICONS.reset}</button>
      </div>
      <div class="barbell"><div class="barbell-bar"></div>${plates.join('')}</div>
    </div>

    ${activeBanner}

    <div class="section-label">${user.activeSession ? 'Zacznij inny trening' : 'Rozpocznij trening'}</div>
    ${renderPlanPickerCards(user)}

    ${recentHtml}
  `;
        }

        function renderPlanPickerCards(user) {
            let html = '';
            user.plans.forEach(p => {
                html += `
      <div class="plan-pick-card" data-start-plan="${p.id}">
        <div class="plan-pick-left">
          <div class="plan-pick-badge">${escapeHtml(p.name.charAt(0).toUpperCase())}</div>
          <div style="min-width:0;">
            <div class="plan-pick-name">${escapeHtml(p.name)}</div>
            <div class="plan-pick-sub">${p.exercises.length ? escapeHtml(p.exercises.join(' · ')) : 'Brak ćwiczeń'}</div>
          </div>
        </div>
        <div class="history-chev">${ICONS.chevronRight}</div>
      </div>`;
            });
            html += `
    <div class="plan-pick-card" data-start-plan="freeform">
      <div class="plan-pick-left">
        <div class="plan-pick-badge">${ICONS.plus}</div>
        <div class="plan-pick-name">Trening dowolny</div>
      </div>
      <div class="history-chev">${ICONS.chevronRight}</div>
    </div>`;
            return html;
        }

        function renderHistoryCard(session) {
            const d = fmtDateShort(session.date);
            const totalSets = session.exercises.reduce((a, e) => a + e.sets.length, 0);
            return `
    <div class="history-card" data-history-item="${session.id}">
      <div class="history-date-box"><div class="history-date-day mono">${d.day}</div><div class="history-date-mon">${d.mon}</div></div>
      <div class="history-info">
        <div class="history-plan">${escapeHtml(session.planName || 'Trening dowolny')}</div>
        <div class="history-meta">${session.exercises.length} ćwiczeń · ${totalSets} serii</div>
      </div>
      <div class="history-chev">${ICONS.chevronRight}</div>
    </div>`;
        }

        function attachDashboardEvents(user) {
            const resetBtn = document.getElementById('resetCountBtn');
            if (resetBtn) resetBtn.addEventListener('click', () => {
                showConfirmModal({
                    title: 'Zresetować licznik?',
                    message: 'Liczba treningów w ' + currentYear() + ' roku zostanie ustawiona na 0. Tej operacji nie można cofnąć.',
                    confirmLabel: 'Resetuj', danger: true,
                    onConfirm: () => {
                        user.yearlyCount = 0;
                        user.yearlyCountYear = currentYear();
                        save();
                        showToast('Licznik zresetowany');
                        render();
                    }
                });
            });
            const resumeBtn = document.getElementById('resumeSessionBtn');
            if (resumeBtn) resumeBtn.addEventListener('click', () => goto('session'));
            const resumeCard = document.getElementById('resumeSessionCard');
            if (resumeCard) resumeCard.addEventListener('click', (e) => {
                if (e.target.closest('#resumeSessionBtn')) return;
                goto('session');
            });

            document.querySelectorAll('[data-start-plan]').forEach(el => {
                el.addEventListener('click', () => {
                    const planId = el.getAttribute('data-start-plan');
                    startSession(user, planId === 'freeform' ? null : planId);
                });
            });
            document.querySelectorAll('[data-history-item]').forEach(el => {
                el.addEventListener('click', () => goto('historyDetail', {sessionId: el.getAttribute('data-history-item')}));
            });
            const seeAll = document.getElementById('seeAllHistoryBtn');
            if (seeAll) seeAll.addEventListener('click', () => goto('history'));
        }

        /* ============================================================
       SESSION (active training)
    ============================================================ */
        function startSession(user, planId) {
            if (user.activeSession) {
                goto('session');
                return;
            }
            let planName = null, exNames = [];
            if (planId) {
                const plan = user.plans.find(p => p.id === planId);
                if (plan) {
                    planName = plan.name;
                    exNames = plan.exercises.slice();
                }
            }
            user.activeSession = {
                id: uid(), date: todayISO(), planId: planId || null, planName,
                exercises: exNames.map(name => ({name, sets: []}))
            };
            save();
            goto('session');
        }

        function findLastPerformance(user, exerciseName, excludeSessionId) {
            const nameLc = exerciseName.trim().toLowerCase();
            for (const s of user.history) {
                if (excludeSessionId && s.id === excludeSessionId) continue;
                const ex = s.exercises.find(e => e.name.trim().toLowerCase() === nameLc);
                if (ex && ex.sets.length) {
                    return {date: s.date, sets: ex.sets};
                }
            }
            return null;
        }

        function renderSessionView(user) {
            if (!user.activeSession) {
                return `
      <div class="view-title">Trening</div>
      <div class="view-sub">Wybierz plan lub zacznij trening dowolny.</div>
      ${renderPlanPickerCards(user)}
    `;
            }
            const s = user.activeSession;
            let exHtml = '';
            s.exercises.forEach((ex, idx) => {
                const last = findLastPerformance(user, ex.name);
                let lastLine = '<div class="exercise-last">Brak wcześniejszych danych — pierwszy raz!</div>';
                if (last) {
                    const summary = last.sets.map(st => `${st.reps}×${st.weight}kg`).join(', ');
                    lastLine = `<div class="exercise-last">Poprzednio (${fmtDateShort(last.date).day}.${fmtDateShort(last.date).mon}): <span class="mono">${escapeHtml(summary)}</span></div>`;
                }
                let setsHtml = '';
                ex.sets.forEach((st, sIdx) => {
                    setsHtml += `
        <div class="set-row" data-ex="${idx}" data-set="${sIdx}">
          <div class="set-idx mono">${sIdx + 1}</div>
          <div class="set-input-wrap"><input class="set-input mono" type="number" inputmode="numeric" min="0" placeholder="powt." data-field="reps" value="${st.reps !== '' && st.reps !== null && st.reps !== undefined ? st.reps : ''}"></div>
          <div class="set-input-wrap"><input class="set-input mono" type="number" inputmode="decimal" min="0" step="0.5" placeholder="kg" data-field="weight" value="${st.weight !== '' && st.weight !== null && st.weight !== undefined ? st.weight : ''}"></div>
          <button class="set-remove" data-remove-set data-ex="${idx}" data-set="${sIdx}">${ICONS.x}</button>
        </div>`;
                });
                exHtml += `
      <div class="exercise-card" style="border-left-color:${PLATE_COLORS[idx % PLATE_COLORS.length]}" data-exercise-idx="${idx}">
        <div class="exercise-head">
          <div>
            <div class="exercise-name">${escapeHtml(ex.name)}</div>
            ${lastLine}
          </div>
          <button class="icon-btn exercise-remove" data-remove-exercise="${idx}" title="Usuń ćwiczenie">${ICONS.trash}</button>
        </div>
        <div class="sets-table">
          ${ex.sets.length ? `<div class="sets-head-row"><div></div><div>Powtórzenia</div><div>Obciążenie</div><div></div></div>` : ''}
          ${setsHtml}
        </div>
        <button class="add-set-btn" data-add-set="${idx}">${ICONS.plus} Dodaj serię</button>
      </div>`;
            });

            return `
    <div class="view-title">${escapeHtml(s.planName || 'Trening dowolny')}</div>
    <div class="view-sub">${fmtDateLong(s.date)}</div>
    ${exHtml || `<div class="empty-state"><div class="icon-wrap">${ICONS.dumbbell}</div><div class="et1">Brak ćwiczeń</div><div class="et2">Dodaj pierwsze ćwiczenie, aby zacząć rejestrować serie.</div></div>`}
    <button class="btn btn-secondary" id="addExerciseBtn" style="margin-bottom:18px;">${ICONS.plus} Dodaj ćwiczenie</button>
    <div class="session-footer">
      <div class="btn-block-row">
        <button class="btn btn-danger" id="cancelSessionBtn">Anuluj</button>
        <button class="btn btn-primary" id="finishSessionBtn">${ICONS.check} Zakończ trening</button>
      </div>
    </div>
  `;
        }

        function attachSessionEvents(user) {
            if (!user.activeSession) {
                document.querySelectorAll('[data-start-plan]').forEach(el => {
                    el.addEventListener('click', () => {
                        const planId = el.getAttribute('data-start-plan');
                        startSession(user, planId === 'freeform' ? null : planId);
                    });
                });
                return;
            }
            const s = user.activeSession;

            document.getElementById('addExerciseBtn').addEventListener('click', () => {
                showExercisePickerModal({
                    user, existingNames: s.exercises.map(e => e.name),
                    onSubmit: (name) => {
                        s.exercises.push({name, sets: []});
                        save();
                        goto('session');
                    }
                });
            });

            document.querySelectorAll('[data-remove-exercise]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-remove-exercise'), 10);
                    showConfirmModal({
                        title: 'Usunąć ćwiczenie?',
                        message: 'Usuniesz "' + s.exercises[idx].name + '" z bieżącego treningu.',
                        confirmLabel: 'Usuń',
                        danger: true,
                        onConfirm: () => {
                            s.exercises.splice(idx, 1);
                            save();
                            goto('session');
                        }
                    });
                });
            });

            document.querySelectorAll('[data-add-set]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.getAttribute('data-add-set'), 10);
                    const ex = s.exercises[idx];
                    let reps = '', weight = '';
                    if (ex.sets.length) {
                        const lastSet = ex.sets[ex.sets.length - 1];
                        reps = lastSet.reps;
                        weight = lastSet.weight;
                    } else {
                        const last = findLastPerformance(user, ex.name);
                        if (last && last.sets.length) {
                            const lastSet = last.sets[last.sets.length - 1];
                            reps = lastSet.reps;
                            weight = lastSet.weight;
                        }
                    }
                    ex.sets.push({reps, weight});
                    save();
                    goto('session');
                    setTimeout(() => {
                        const rows = document.querySelectorAll(`[data-exercise-idx="${idx}"] .set-row`);
                        const lastRow = rows[rows.length - 1];
                        if (lastRow) {
                            const inp = lastRow.querySelector('[data-field="reps"]');
                            if (inp) inp.focus();
                        }
                    }, 60);
                });
            });

            document.querySelectorAll('[data-remove-set]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const exIdx = parseInt(btn.getAttribute('data-ex'), 10);
                    const setIdx = parseInt(btn.getAttribute('data-set'), 10);
                    s.exercises[exIdx].sets.splice(setIdx, 1);
                    save();
                    goto('session');
                });
            });

            document.querySelectorAll('.set-input').forEach(inp => {
                inp.addEventListener('input', () => {
                    const row = inp.closest('.set-row');
                    const exIdx = parseInt(row.getAttribute('data-ex'), 10);
                    const setIdx = parseInt(row.getAttribute('data-set'), 10);
                    const field = inp.getAttribute('data-field');
                    s.exercises[exIdx].sets[setIdx][field] = inp.value;
                    save();
                });
            });

            document.getElementById('cancelSessionBtn').addEventListener('click', () => {
                showConfirmModal({
                    title: 'Anulować trening?',
                    message: 'Wszystkie wprowadzone dane bieżącego treningu zostaną utracone.',
                    confirmLabel: 'Anuluj trening',
                    danger: true,
                    onConfirm: () => {
                        user.activeSession = null;
                        save();
                        showToast('Trening anulowany');
                        goto('dashboard');
                    }
                });
            });

            document.getElementById('finishSessionBtn').addEventListener('click', () => {
                const totalSets = s.exercises.reduce((a, e) => a + e.sets.length, 0);
                if (s.exercises.length === 0 || totalSets === 0) {
                    showToast('Dodaj przynajmniej jedną serię przed zakończeniem');
                    return;
                }
                finishSession(user);
            });
        }

        function finishSession(user) {
            const s = user.activeSession;
            const cleaned = {
                id: s.id, date: s.date, timestamp: Date.now(),
                planId: s.planId, planName: s.planName,
                exercises: s.exercises
                    .filter(e => e.sets.length > 0)
                    .map(e => ({
                        name: e.name,
                        sets: e.sets.map(st => ({
                            reps: st.reps === '' ? 0 : Number(st.reps),
                            weight: st.weight === '' ? 0 : Number(st.weight)
                        }))
                    }))
            };
            user.history.unshift(cleaned);
            cleaned.exercises.forEach(e => {
                if (!user.exerciseLibrary.includes(e.name)) user.exerciseLibrary.push(e.name);
            });
            if (user.yearlyCountYear !== currentYear()) {
                user.yearlyCountYear = currentYear();
                user.yearlyCount = 0;
            }
            user.yearlyCount += 1;
            user.activeSession = null;
            save();
            goto('dashboard');
            showCongrats(user.yearlyCount);
        }

        /* ============================================================
       PLANS
    ============================================================ */
        function renderPlansView(user) {
            let html = `<div class="view-title">Plany treningowe</div><div class="view-sub">Stałe zestawy ćwiczeń, np. Trening A / B / C.</div>`;
            if (!user.plans.length) {
                html += `<div class="empty-state"><div class="icon-wrap">${ICONS.clipboard}</div><div class="et1">Brak planów</div><div class="et2">Utwórz plan, aby przy każdym treningu mieć gotową listę ćwiczeń.</div></div>`;
            } else {
                user.plans.forEach(p => {
                    html += `
        <div class="plan-card" data-plan-card="${p.id}">
          <div class="plan-card-top">
            <div class="plan-card-name">${escapeHtml(p.name)}</div>
            <div class="plan-card-actions">
              <button class="icon-btn" data-edit-plan="${p.id}">${ICONS.pencil}</button>
              <button class="icon-btn danger" data-delete-plan="${p.id}">${ICONS.trash}</button>
            </div>
          </div>
          ${p.exercises.length ? `<div class="chip-row">${p.exercises.map(e => `<span class="chip">${escapeHtml(e)}</span>`).join('')}</div>` : `<div class="plan-card-empty">Brak dodanych ćwiczeń</div>`}
        </div>`;
                });
            }
            html += `<button class="btn btn-primary" id="newPlanBtn" style="margin-top:8px;">${ICONS.plus} Nowy plan</button>`;
            return html;
        }

        function attachPlansEvents(user) {
            document.getElementById('newPlanBtn').addEventListener('click', () => {
                const suggestedLetters = ['A', 'B', 'C', 'D', 'E'];
