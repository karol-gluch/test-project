<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>IronLog — Dziennik treningowy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#14161a;
      --bg-soft:#191c21;
      --surface:#1f232a;
      --surface-2:#272c34;
      --surface-hover:#2c313a;
      --border:#333941;
      --border-soft:#282d35;
      --text:#f3f1ea;
      --text-dim:#9aa0ab;
      --text-faint:#666c76;
      --accent:#e8432f;
      --accent-dim:#e8432f26;
      --accent-2:#2f7de1;
      --accent-2-dim:#2f7de126;
      --gold:#e8b93f;
      --gold-dim:#e8b93f26;
      --green:#3fa35a;
      --green-dim:#3fa35a26;
      --danger:#e8432f;
      --radius-s:9px;
      --radius-m:14px;
      --radius-l:22px;
      --shadow-m:0 10px 30px rgba(0,0,0,.4);
      --shadow-s:0 4px 14px rgba(0,0,0,.3);
      --font-display:'Bebas Neue',sans-serif;
      --font-body:'Inter',system-ui,-apple-system,sans-serif;
      --font-mono:'JetBrains Mono',ui-monospace,monospace;
      --nav-h:64px;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font-body);
      -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:contain;
    }
    ::selection{background:var(--accent);color:#fff;}
    button{font-family:inherit;}
    input,select,textarea{font-family:inherit;color:var(--text);}
    a{color:inherit;}
    .hidden{display:none !important;}
    :focus-visible{outline:2px solid var(--accent-2);outline-offset:2px;}

    /* ---------- layout ---------- */
    .app{
      display:grid;
      grid-template-areas:"header" "content" "nav";
      grid-template-rows:auto 1fr auto;
      min-height:100vh;
      min-height:100dvh;
    }
    .topbar{
      grid-area:header;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid var(--border-soft);
      background:linear-gradient(180deg,var(--bg-soft),var(--bg));
      position:sticky;top:0;z-index:20;
    }
    .brand{display:flex;align-items:center;gap:10px;}
    .logo-plates{display:flex;}
    .logo-plates span{width:11px;height:22px;border-radius:3px;margin-left:-4px;box-shadow:0 0 0 1.5px var(--bg-soft);}
    .logo-plates span:nth-child(1){background:var(--accent);z-index:3;margin-left:0;}
    .logo-plates span:nth-child(2){background:var(--gold);z-index:2;height:18px;align-self:center;}
    .logo-plates span:nth-child(3){background:var(--accent-2);z-index:1;height:14px;align-self:center;}
    .brand h1{
      font-family:var(--font-display);
      font-size:24px;letter-spacing:.5px;margin:0;font-weight:400;line-height:1;
    }
    .brand h1 em{color:var(--accent);font-style:normal;}
    .user-btn{
      display:flex;align-items:center;gap:8px;
      background:var(--surface);border:1px solid var(--border);
      border-radius:999px;padding:6px 12px 6px 6px;cursor:pointer;
      transition:background .15s;
    }
    .user-btn:hover{background:var(--surface-hover);}
    .avatar{
      width:26px;height:26px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-family:var(--font-display);font-size:14px;color:#fff;
      background:var(--accent);flex-shrink:0;
    }
    .user-btn span.uname{font-size:13px;font-weight:600;color:var(--text);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    #content{grid-area:content;overflow-y:auto;padding:16px 16px 28px;max-width:760px;margin:0 auto;width:100%;}

    .bottomnav{
      grid-area:nav;
      display:flex;justify-content:space-around;align-items:stretch;
      background:var(--bg-soft);
      border-top:1px solid var(--border-soft);
      padding:4px 2px calc(4px + env(safe-area-inset-bottom));
      position:sticky;bottom:0;z-index:20;
    }
    .navbtn{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;background:none;border:none;color:var(--text-faint);
      padding:8px 4px 7px;cursor:pointer;font-size:10.5px;font-weight:600;
      letter-spacing:.2px;border-radius:12px;transition:color .15s;
    }
    .navbtn svg{width:22px;height:22px;stroke:currentColor;}
    .navbtn.active{color:var(--accent);}
    .navbtn:hover{color:var(--text-dim);}
    .navbtn.active:hover{color:var(--accent);}

    @media (min-width:860px){
      .app{grid-template-areas:"header header" "nav content";grid-template-columns:224px 1fr;grid-template-rows:auto 1fr;}
      .bottomnav{
        flex-direction:column;justify-content:flex-start;align-items:stretch;gap:4px;
        padding:22px 12px;border-top:none;border-right:1px solid var(--border-soft);
      }
      .navbtn{flex-direction:row;justify-content:flex-start;gap:12px;padding:12px 14px;font-size:13.5px;}
      .navbtn svg{width:20px;height:20px;}
      #content{padding:28px 32px 40px;max-width:820px;}
    }

    /* ---------- primitives ---------- */
    .card{
      background:var(--surface);
      border:1px solid var(--border-soft);
      border-radius:var(--radius-m);
      padding:16px;
      margin-bottom:12px;
    }
    .section-title{
      font-family:var(--font-display);
      font-size:21px;letter-spacing:.3px;margin:4px 0 12px;color:var(--text);
      display:flex;align-items:center;justify-content:space-between;gap:8px;
    }
    .muted{color:var(--text-dim);font-size:13px;}
    .faint{color:var(--text-faint);font-size:12px;}
    .mono{font-family:var(--font-mono);}

    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:7px;
      border:1px solid transparent;border-radius:var(--radius-s);
      padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;
      transition:transform .08s,background .15s,opacity .15s;user-select:none;
    }
    .btn:active{transform:scale(.97);}
    .btn svg{width:16px;height:16px;stroke:currentColor;flex-shrink:0;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{background:#f0523d;}
    .btn-secondary{background:var(--surface-2);color:var(--text);border-color:var(--border);}
    .btn-secondary:hover{background:var(--surface-hover);}
    .btn-ghost{background:transparent;color:var(--text-dim);}
    .btn-ghost:hover{color:var(--text);background:var(--surface-2);}
    .btn-danger{background:transparent;color:var(--accent);border-color:var(--accent-dim);}
    .btn-danger:hover{background:var(--accent-dim);}
    .btn-block{width:100%;}
    .btn-sm{padding:7px 11px;font-size:12.5px;border-radius:8px;}
    .iconbtn{
      width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;
      background:var(--surface-2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;flex-shrink:0;
    }
    .iconbtn svg{width:15px;height:15px;stroke:currentColor;}
    .iconbtn:hover{color:var(--text);background:var(--surface-hover);}
    .iconbtn.danger:hover{color:var(--accent);border-color:var(--accent-dim);}

    .field{margin-bottom:14px;}
    .field label{display:block;font-size:12.5px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.2px;}
    .input{
      width:100%;background:var(--bg-soft);border:1px solid var(--border);
      border-radius:var(--radius-s);padding:11px 12px;font-size:15px;color:var(--text);
    }
    .input:focus{border-color:var(--accent-2);}

    .chip{
      display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);
      border:1px solid var(--border);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--text-dim);
    }

    .empty-state{
      text-align:center;padding:40px 16px;color:var(--text-dim);
    }
    .empty-state .glyph{font-size:38px;margin-bottom:10px;opacity:.6;}
    .empty-state h3{font-family:var(--font-display);font-weight:400;font-size:20px;color:var(--text);margin:0 0 6px;letter-spacing:.3px;}
    .empty-state p{margin:0 0 16px;font-size:13.5px;line-height:1.5;}

    /* plate color coding */
    .plate-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .p0{background:var(--accent);} .p1{background:var(--accent-2);} .p2{background:var(--gold);} .p3{background:var(--green);}

    /* ---------- onboarding ---------- */
    .onboarding{
      min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
      padding:24px;background:radial-gradient(circle at 30% 20%,#1d2128,var(--bg) 60%);
    }
    .onboarding-box{max-width:360px;width:100%;text-align:center;}
    .onboarding .logo-plates{justify-content:center;margin:0 auto 18px;transform:scale(1.6);width:fit-content;}
    .onboarding h1{font-family:var(--font-display);font-size:42px;margin:0 0 6px;letter-spacing:1px;}
    .onboarding h1 em{color:var(--accent);font-style:normal;}
    .onboarding p{color:var(--text-dim);font-size:14px;margin:0 0 26px;line-height:1.5;}

    /* ---------- start-workout screen ---------- */
    .plan-pick{
      display:flex;flex-direction:column;gap:10px;margin-bottom:18px;
    }
    .plan-pick-btn{
      display:flex;align-items:center;gap:12px;width:100%;text-align:left;
      background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-m);
      padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s;
    }
    .plan-pick-btn:hover{background:var(--surface-hover);border-color:var(--border);}
    .plan-pick-swatch{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
      font-family:var(--font-display);font-size:18px;color:#12141a;flex-shrink:0;}
    .plan-pick-info b{display:block;font-size:14.5px;color:var(--text-dim);}
    .plan-pick-info span{font-size:12px;color:var(--text-dim);}
    .plan-pick-btn.custom .plan-pick-swatch{background:var(--surface-2);color:var(--text-dim);}
    .plan-pick-btn.custom .plan-pick-swatch svg{width:18px;height:18px;stroke:currentColor;}

    .recent-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft);font-size:13px;}
    .recent-row:last-child{border-bottom:none;}

    /* ---------- active workout ---------- */
    .workout-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:10px;}
    .workout-head h2{font-family:var(--font-display);font-size:26px;margin:0;letter-spacing:.3px;}
    .workout-head .muted{margin-top:2px;}

    .ex-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-m);padding:14px 14px 12px;margin-bottom:12px;}
    .ex-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;}
    .ex-title{display:flex;align-items:center;gap:8px;}
    .ex-title h3{font-size:15.5px;margin:0;font-weight:700;}
    .ex-prev{font-size:12px;color:var(--text-dim);margin:2px 0 10px;line-height:1.5;}
    .ex-prev b{color:var(--text);font-weight:600;}

    .set-row{display:grid;grid-template-columns:26px 1fr 1fr 30px;gap:8px;align-items:center;margin-bottom:7px;}
    .set-num{width:22px;height:22px;border-radius:50%;background:var(--surface-2);color:var(--text-dim);
      display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-mono);}
    .set-input-wrap{position:relative;}
    .set-input-wrap input{
      width:100%;background:var(--bg-soft);border:1px solid var(--border);border-radius:8px;
      padding:9px 8px 9px 10px;font-size:14.5px;font-family:var(--font-mono);font-weight:600;color:var(--text);
    }
    .set-input-wrap input:focus{border-color:var(--accent-2);}
    .set-input-wrap .unit{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:10.5px;color:var(--text-faint);pointer-events:none;}
    .set-row.pr .set-input-wrap:last-of-type input{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-dim);}
    .pr-badge{
      display:inline-flex;align-items:center;gap:3px;background:var(--gold-dim);color:var(--gold);
      border-radius:999px;padding:2px 8px 2px 6px;font-size:10px;font-weight:800;letter-spacing:.4px;
      margin-left:6px;
    }
    .set-del{width:26px;height:26px;border-radius:7px;background:transparent;border:none;color:var(--text-faint);cursor:pointer;
      display:flex;align-items:center;justify-content:center;}
    .set-del:hover{color:var(--accent);background:var(--accent-dim);}
    .set-del svg{width:13px;height:13px;stroke:currentColor;}

    .add-set-btn{
      width:100%;margin-top:2px;padding:9px;border-radius:8px;border:1.5px dashed var(--border);
      background:transparent;color:var(--text-dim);font-size:12.5px;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:6px;
    }
    .add-set-btn:hover{border-color:var(--accent-2);color:var(--accent-2);}
    .add-set-btn svg{width:14px;height:14px;stroke:currentColor;}

    .add-ex-inline{display:flex;gap:8px;margin:6px 0 18px;}
    .add-ex-inline input{flex:1;}

    .workout-actions{display:flex;gap:10px;margin-top:6px;}

    /* ---------- history ---------- */
    .hist-item{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-m);margin-bottom:10px;overflow:hidden;}
    .hist-item-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;gap:8px;}
    .hist-item-head:hover{background:var(--surface-hover);}
    .hist-date-badge{
      font-family:var(--font-mono);font-size:11px;color:var(--text-dim);background:var(--bg-soft);
      border:1px solid var(--border);border-radius:7px;padding:5px 8px;text-align:center;flex-shrink:0;min-width:52px;
    }
    .hist-info{flex:1;min-width:0;}
    .hist-info b{display:block;font-size:14px;}
    .hist-info span{font-size:12px;color:var(--text-dim);}
    .hist-chevron{width:18px;height:18px;stroke:var(--text-faint);flex-shrink:0;transition:transform .2s;}
    .hist-item.open .hist-chevron{transform:rotate(180deg);}
    .hist-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border-soft);}
    .hist-item.open .hist-body{display:block;}
    .hist-ex{padding:10px 0;border-bottom:1px solid var(--border-soft);}
    .hist-ex:last-child{border-bottom:none;}
    .hist-ex b{font-size:13.5px;display:block;margin-bottom:4px;}
    .hist-ex .sets-line{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);}
    .hist-del-row{display:flex;justify-content:flex-end;margin-top:8px;}

    /* ---------- plans ---------- */
    .plan-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-m);padding:15px;margin-bottom:12px;}
    .plan-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .plan-card-head h3{font-family:var(--font-display);font-size:19px;margin:0;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
    .plan-card-actions{display:flex;gap:6px;}
    .plan-ex-list{display:flex;flex-wrap:wrap;gap:6px;}

    /* ---------- stats ---------- */
    .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
    .stat-box{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-m);padding:13px 10px;text-align:center;}
    .stat-box .num{font-family:var(--font-display);font-size:26px;color:var(--accent);line-height:1;}
    .stat-box .lbl{font-size:10.5px;color:var(--text-dim);margin-top:4px;letter-spacing:.2px;}
    .chart-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-m);padding:16px;margin-bottom:14px;}
    .chart-card h4{margin:0 0 10px;font-size:13px;color:var(--text-dim);font-weight:600;letter-spacing:.2px;}
    .chart-empty{padding:30px 0;text-align:center;color:var(--text-faint);font-size:13px;}
    .chart-svg{width:100%;height:auto;display:block;}
    .select-wrap select{
      width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-s);
      padding:11px 12px;font-size:14.5px;color:var(--text);appearance:none;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path d='M6 9l6 6 6-6' stroke='%239aa0ab' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat:no-repeat;background-position:right 12px center;background-size:16px;
    }
    .stat-table{width:100%;border-collapse:collapse;font-size:12.5px;}
    .stat-table th{text-align:left;color:var(--text-faint);font-weight:600;font-size:11px;padding:6px 8px;border-bottom:1px solid var(--border-soft);}
    .stat-table td{padding:7px 8px;border-bottom:1px solid var(--border-soft);font-family:var(--font-mono);}
    .stat-table tr:last-child td{border-bottom:none;}

    /* ---------- modal ---------- */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(10,11,13,.6);backdrop-filter:blur(2px);
      display:flex;align-items:flex-end;justify-content:center;z-index:100;
      opacity:0;pointer-events:none;transition:opacity .18s;
    }
    .modal-overlay.active{opacity:1;pointer-events:auto;}
    .modal-box{
      background:var(--bg-soft);border:1px solid var(--border);border-top-left-radius:20px;border-top-right-radius:20px;
      width:100%;max-width:480px;max-height:86vh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
      transform:translateY(16px);transition:transform .18s;
    }
    .modal-overlay.active .modal-box{transform:translateY(0);}
    @media (min-width:640px){
      .modal-overlay{align-items:center;}
      .modal-box{border-radius:20px;transform:translateY(0) scale(.97);}
      .modal-overlay.active .modal-box{transform:translateY(0) scale(1);}
    }
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
    .modal-head h3{font-family:var(--font-display);font-size:21px;margin:0;letter-spacing:.3px;}
    .user-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:10px;cursor:pointer;margin-bottom:4px;}
    .user-row:hover{background:var(--surface-2);}
    .user-row.current{background:var(--accent-dim);}
    .user-row .avatar{width:34px;height:34px;font-size:16px;}
    .user-row b{font-size:14.5px;flex:1;}
    .plan-ex-edit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
    .plan-ex-edit-row input{flex:1;}

    .toast-container{position:fixed;bottom:calc(var(--nav-h) + 16px);left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:200;pointer-events:none;}
    .toast{
      background:var(--surface-2);border:1px solid var(--border);color:var(--text);
      padding:10px 18px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:var(--shadow-s);
      animation:toastin .25s ease;
    }
    @keyframes toastin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

    @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
  </style>
</head>
<body>

<div id="onboarding" class="onboarding hidden">
  <div class="onboarding-box">
    <div class="logo-plates"><span></span><span></span><span></span></div>
    <h1>IRON<em>LOG</em></h1>
    <p>Twój cyfrowy dziennik treningowy. Dodaj profil, żeby zacząć zapisywać postępy na siłowni.</p>
    <div class="field">
      <label for="onb-name">Twoje imię</label>
      <input id="onb-name" class="input" placeholder="np. Kamil" maxlength="20" onkeydown="if(event.key==='Enter')createFirstUser()">
    </div>
    <button class="btn btn-primary btn-block" onclick="createFirstUser()">Rozpocznij</button>
  </div>
</div>

<div id="app" class="app hidden">
  <header class="topbar">
    <div class="brand">
      <div class="logo-plates"><span></span><span></span><span></span></div>
      <h1>IRON<em>LOG</em></h1>
    </div>
    <button class="user-btn" onclick="openUserModal()">
      <span id="user-avatar" class="avatar"></span>
      <span id="user-name-label" class="uname"></span>
    </button>
  </header>

  <main id="content"></main>

  <nav class="bottomnav">
    <button class="navbtn" data-view="trening" onclick="switchView('trening')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 9v6M2 10v4M6 6v12M18 6v12M22 10v4M20 9v6M8 12h8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Trening
    </button>
    <button class="navbtn" data-view="historia" onclick="switchView('historia')">
      <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2.5" stroke-width="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke-width="2" stroke-linecap="round"/></svg>
      Historia
    </button>
    <button class="navbtn" data-view="plany" onclick="switchView('plany')">
      <svg viewBox="0 0 24 24" fill="none"><rect x="5" y="4" width="14" height="17" rx="2.5" stroke-width="2"/><path d="M9 3.3h6v3H9z" stroke-width="1.6"/><path d="M8.5 11.5h7M8.5 15h7" stroke-width="2" stroke-linecap="round"/></svg>
      Plany
    </button>
    <button class="navbtn" data-view="statystyki" onclick="switchView('statystyki')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 20V11M10 20V4M16 20v-8M22 20H2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Statystyki
    </button>
  </nav>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div id="modal-box" class="modal-box"></div>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
  /* =========================================================
     IronLog — dziennik treningowy — logika aplikacji
     ========================================================= */
  const DB_KEY = 'ironlog_db_v1';
  let db = null;
  let currentView = 'trening';
  let openHistoryIds = new Set();
  let planDraft = null; // used while editing/creating a plan in modal

  /* ---------- utils ---------- */
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function todayISO(){ return new Date().toISOString().slice(0,10); }
  function nowISO(){ return new Date().toISOString(); }
  function formatDate(iso){
    const d = new Date(iso + (iso.length<=10 ? 'T00:00:00' : ''));
    return d.toLocaleDateString('pl-PL', {day:'2-digit', month:'2-digit', year:'numeric'});
  }
  function formatShortDate(iso){
    const d = new Date(iso + (iso.length<=10 ? 'T00:00:00' : ''));
    return d.toLocaleDateString('pl-PL', {day:'2-digit', month:'2-digit'});
  }
  function daysAgo(iso){
    const a = new Date(iso + 'T00:00:00'), b = new Date(todayISO()+'T00:00:00');
    return Math.round((b-a)/86400000);
  }
  function daysAgoLabel(iso){
    const n = daysAgo(iso);
    if(n===0) return 'dzisiaj';
    if(n===1) return 'wczoraj';
    return n + ' dni temu';
  }
  function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtNum(n){ n = Number(n)||0; return (Math.round(n*100)/100).toString().replace('.', ','); }
  function plateClass(i){ return 'p'+(i%4); }

  /* ---------- persistence ---------- */
  function loadDB(){
    try{
      const raw = localStorage.getItem(DB_KEY);
      if(raw) db = JSON.parse(raw);
    }catch(e){ console.error('DB load error', e); }
    if(!db){ db = {users:[], currentUserId:null, data:{}}; }
    if(!db.data) db.data = {};
  }
  function save(){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }
  function ensureUserData(userId){
    if(!db.data[userId]) db.data[userId] = {plans:[], workouts:[], draft:null};
    return db.data[userId];
  }
  function currentUD(){ return ensureUserData(db.currentUserId); }
  function currentUser(){ return db.users.find(u=>u.id===db.currentUserId); }

  /* ---------- boot ---------- */
  function boot(){
    loadDB();
    if(db.users.length === 0){
      document.getElementById('onboarding').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
      return;
    }
    if(!db.currentUserId || !db.users.find(u=>u.id===db.currentUserId)){
      db.currentUserId = db.users[0].id;
      save();
    }
    document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    renderApp();
  }

  function createFirstUser(){
    const nameInput = document.getElementById('onb-name');
    const name = nameInput.value.trim();
    if(!name){ nameInput.focus(); return; }
    const u = {id: uid(), name};
    db.users.push(u);
    db.currentUserId = u.id;
    ensureUserData(u.id);
    save();
    boot();
  }

  /* ---------- top-level render ---------- */
  function renderApp(){
    const u = currentUser();
    document.getElementById('user-avatar').textContent = u.name.slice(0,1).toUpperCase();
    document.getElementById('user-name-label').textContent = u.name;
    document.querySelectorAll('.navbtn').forEach(b=>{
      b.classList.toggle('active', b.dataset.view === currentView);
    });
    const map = {trening:renderTrening, historia:renderHistoria, plany:renderPlany, statystyki:renderStatystyki};
    (map[currentView] || renderTrening)();
  }
  function switchView(v){ currentView = v; openHistoryIds.clear(); renderApp(); }

  function showToast(msg){
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(), 300); }, 2200);
  }

  /* ---------- modal helpers ---------- */
  function openModal(html){
    document.getElementById('modal-box').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('active');
  }
  function closeModal(){
    document.getElementById('modal-overlay').classList.remove('active');
    planDraft = null;
  }

  /* =========================================================
     USERS
     ========================================================= */
  function openUserModal(){
    openModal(renderUserModalHTML());
  }
  function renderUserModalHTML(){
    const rows = db.users.map(u=>`
    <div class="user-row ${u.id===db.currentUserId?'current':''}" onclick="selectUser('${u.id}')">
      <span class="avatar">${esc(u.name.slice(0,1).toUpperCase())}</span>
      <b>${esc(u.name)}</b>
      ${db.users.length>1 ? `<button class="iconbtn danger" onclick="event.stopPropagation();deleteUser('${u.id}')" title="Usuń użytkownika">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>` : ''}
    </div>`).join('');
    return `
    <div class="modal-head"><h3>Użytkownicy</h3>
      <button class="iconbtn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke-width="2.5" stroke-linecap="round"/></svg></button>
    </div>
    ${rows}
    <div class="add-ex-inline" style="margin-top:14px;">
      <input id="new-user-name" class="input" placeholder="Imię nowego użytkownika" maxlength="20" onkeydown="if(event.key==='Enter')addUser()">
      <button class="btn btn-primary" onclick="addUser()">Dodaj</button>
    </div>`;
  }
  function addUser(){
    const inp = document.getElementById('new-user-name');
    const name = inp.value.trim();
    if(!name) return;
    const u = {id:uid(), name};
    db.users.push(u);
    ensureUserData(u.id);
    save();
    openModal(renderUserModalHTML());
  }
  function selectUser(id){
    db.currentUserId = id;
    save();
    closeModal();
    currentView = 'trening';
    renderApp();
  }
  function deleteUser(id){
    if(!confirm('Usunąć tego użytkownika oraz cały jego dziennik treningowy? Tej operacji nie można cofnąć.')) return;
    db.users = db.users.filter(u=>u.id!==id);
    delete db.data[id];
    if(db.currentUserId === id){ db.currentUserId = db.users[0] ? db.users[0].id : null; }
    save();
    if(db.users.length===0){ closeModal(); boot(); return; }
    openModal(renderUserModalHTML());
    renderApp();
  }

  /* =========================================================
     TRENING (active workout)
     ========================================================= */
  function findLastExercise(userId, name, excludeWorkoutId){
    const ud = ensureUserData(userId);
    const norm = name.trim().toLowerCase();
    const list = ud.workouts.filter(w=>w.id!==excludeWorkoutId)
            .slice().sort((a,b)=> (b.finishedAt||b.startedAt).localeCompare(a.finishedAt||a.startedAt));
    for(const w of list){
      const ex = w.exercises.find(e=>e.name.trim().toLowerCase()===norm && e.sets.length>0);
      if(ex) return {workout:w, exercise:ex};
    }
    return null;
  }
  function maxWeightEver(userId, name, excludeWorkoutId){
    const ud = ensureUserData(userId);
    const norm = name.trim().toLowerCase();
    let max = 0;
    ud.workouts.forEach(w=>{
      if(w.id===excludeWorkoutId) return;
      w.exercises.forEach(e=>{
        if(e.name.trim().toLowerCase()===norm){
          e.sets.forEach(s=>{ if(s.weight>max) max=s.weight; });
        }
      });
    });
    return max;
  }

  function renderTrening(){
    const ud = currentUD();
    const content = document.getElementById('content');
    if(!ud.draft){
      content.innerHTML = renderStartScreen(ud);
    } else {
      content.innerHTML = renderActiveWorkout(ud.draft, ud);
    }
  }

  function renderStartScreen(ud){
    const plans = ud.plans;
    const planBtns = plans.map((p,i)=>`
    <button class="plan-pick-btn" onclick="startWorkout('${p.id}')">
      <div class="plan-pick-swatch" style="background:${['var(--accent)','var(--accent-2)','var(--gold)','var(--green)'][i%4]}">${esc(p.name.slice(0,1).toUpperCase())}</div>
      <div class="plan-pick-info"><b>${esc(p.name)}</b><span>${p.exercises.length} ćwiczeń${p.exercises.length? ' · ' + p.exercises.slice(0,3).map(e=>e.name).join(', ') + (p.exercises.length>3?'…':'') : ''}</span></div>
    </button>`).join('');

    const recent = ud.workouts.slice().sort((a,b)=> (b.finishedAt||b.startedAt).localeCompare(a.finishedAt||a.startedAt)).slice(0,3);
    const recentHTML = recent.length ? `
    <div class="card" style="margin-top:18px;">
      <div class="section-title" style="font-size:15px;">Ostatnie treningi</div>
      ${recent.map(w=>`
        <div class="recent-row">
          <span>${esc(w.label)} <span class="faint">· ${formatShortDate(w.date)}</span></span>
          <span class="faint">${daysAgoLabel(w.date)}</span>
        </div>`).join('')}
    </div>` : '';

    return `
    <div class="section-title">Rozpocznij trening</div>
    <div class="plan-pick">
      ${planBtns}
      <button class="plan-pick-btn custom" onclick="startWorkout(null)">
        <div class="plan-pick-swatch"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke-width="2.5" stroke-linecap="round"/></svg></div>
        <div class="plan-pick-info"><b>Trening dowolny</b><span>Dodawaj ćwiczenia na bieżąco</span></div>
      </button>
    </div>
    ${plans.length===0 ? `<p class="faint" style="margin-top:-8px;">Wskazówka: w zakładce „Plany” możesz utworzyć stałe treningi (np. A / B / C), żeby szybciej rozpoczynać kolejne sesje.</p>` : ''}
    ${recentHTML}
  `;
  }

  function startWorkout(planId){
    const ud = currentUD();
    const plan = planId ? ud.plans.find(p=>p.id===planId) : null;
    ud.draft = {
      id: uid(),
      date: todayISO(),
      startedAt: nowISO(),
      finishedAt: null,
      label: plan ? plan.name : 'Trening dowolny',
      planId: plan ? plan.id : null,
      exercises: plan ? plan.exercises.map(e=>({id:uid(), name:e.name, sets:[]})) : []
    };
    save();
    renderApp();
  }

  function renderActiveWorkout(draft, ud){
    const exCards = draft.exercises.map((ex, i)=> renderExerciseCard(ex, i, draft, ud)).join('');
    return `
    <div class="workout-head">
      <div>
        <h2>${esc(draft.label)}</h2>
        <div class="muted">${formatDate(draft.date)}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="cancelWorkout()">Anuluj</button>
    </div>
    ${exCards || `<div class="empty-state"><div class="glyph">🏋️</div><h3>Brak ćwiczeń</h3><p>Dodaj pierwsze ćwiczenie, żeby zacząć zapisywać serie.</p></div>`}
    <div class="add-ex-inline">
      <input id="new-ex-name" class="input" placeholder="Nazwa ćwiczenia, np. Wyciskanie sztangi" onkeydown="if(event.key==='Enter')addExerciseToDraft()">
      <button class="btn btn-secondary" onclick="addExerciseToDraft()">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="workout-actions">
      <button class="btn btn-primary btn-block" onclick="finishWorkout()">Zakończ trening</button>
    </div>
  `;
  }

  function renderExerciseCard(ex, i, draft, ud){
    const last = findLastExercise(db.currentUserId, ex.name, draft.id);
    const prevText = last
            ? `Poprzednio (${formatShortDate(last.workout.date)}): <b>${last.exercise.sets.map(s=> fmtNum(s.weight)+'kg×'+s.reps).join(', ')}</b>`
            : 'Brak wcześniejszej historii dla tego ćwiczenia.';
    const bestEver = maxWeightEver(db.currentUserId, ex.name, draft.id);

    const setRows = ex.sets.map((s, idx)=>{
      const isPR = s.weight > 0 && s.weight >= bestEver && bestEver > 0 && s.weight > bestEver;
      const isFirstEver = bestEver === 0 && s.weight > 0;
      return `
    <div class="set-row ${isPR||isFirstEver?'pr':''}" id="setrow-${ex.id}-${idx}">
      <div class="set-num">${idx+1}</div>
      <div class="set-input-wrap">
        <input type="number" inputmode="numeric" min="0" step="1" value="${s.reps||''}" placeholder="0"
          onchange="updateSet('${draft.id}','${ex.id}',${idx},'reps',this.value)">
        <span class="unit">powt.</span>
      </div>
      <div class="set-input-wrap">
        <input type="number" inputmode="decimal" min="0" step="2.5" value="${s.weight||''}" placeholder="0"
          onchange="updateSet('${draft.id}','${ex.id}',${idx},'weight',this.value)">
        <span class="unit">kg</span>
      </div>
      <button class="set-del" onclick="removeSet('${draft.id}','${ex.id}',${idx})">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    ${isPR ? `<div style="margin:-3px 0 8px 32px;"><span class="pr-badge">★ PR</span></div>` : ''}
    `;
    }).join('');

    return `
  <div class="ex-card">
    <div class="ex-card-top">
      <div class="ex-title"><span class="plate-dot ${plateClass(i)}"></span><h3>${esc(ex.name)}</h3></div>
      <button class="iconbtn danger" onclick="removeExerciseFromDraft('${draft.id}','${ex.id}')" title="Usuń ćwiczenie">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div class="ex-prev">${prevText}</div>
    ${setRows}
    <button class="add-set-btn" onclick="addSetToExercise('${draft.id}','${ex.id}')">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke-width="2.5" stroke-linecap="round"/></svg>
      Dodaj serię
    </button>
  </div>`;
  }

  function addExerciseToDraft(){
    const inp = document.getElementById('new-ex-name');
    const name = inp.value.trim();
    if(!name) return;
    const ud = currentUD();
    ud.draft.exercises.push({id:uid(), name, sets:[]});
    save();
    renderApp();
  }
  function removeExerciseFromDraft(draftId, exId){
    const ud = currentUD();
    if(!ud.draft || ud.draft.id!==draftId) return;
    ud.draft.exercises = ud.draft.exercises.filter(e=>e.id!==exId);
    save();
    renderApp();
  }
  function addSetToExercise(draftId, exId){
    const ud = currentUD();
    if(!ud.draft || ud.draft.id!==draftId) return;
    const ex = ud.draft.exercises.find(e=>e.id===exId);
    if(!ex) return;
    const last = findLastExercise(db.currentUserId, ex.name, ud.draft.id);
    let reps = 0, weight = 0;
    if(last){
      const idx = ex.sets.length;
      const ls = last.exercise.sets[idx] || last.exercise.sets[last.exercise.sets.length-1];
      if(ls){ reps = ls.reps; weight = ls.weight; }
    }
    ex.sets.push({reps, weight});
    save();
    renderApp();
  }
  function removeSet(draftId, exId, idx){
    const ud = currentUD();
    if(!ud.draft || ud.draft.id!==draftId) return;
    const ex = ud.draft.exercises.find(e=>e.id===exId);
    if(!ex) return;
    ex.sets.splice(idx,1);
    save();
    renderApp();
  }
  function updateSet(draftId, exId, idx, field, value){
    const ud = currentUD();
    if(!ud.draft || ud.draft.id!==draftId) return;
    const ex = ud.draft.exercises.find(e=>e.id===exId);
    if(!ex || !ex.sets[idx]) return;
    const num = parseFloat(String(value).replace(',','.'));
    ex.sets[idx][field] = isNaN(num) ? 0 : num;
    save();
    // lightweight refresh of PR badge/prev-line without losing focus elsewhere
    renderApp();
  }
  function cancelWorkout(){
    if(!confirm('Na pewno chcesz anulować trening? Wprowadzone dane zostaną utracone.')) return;
    const ud = currentUD();
    ud.draft = null;
    save();
    renderApp();
  }
  function finishWorkout(){
    const ud = currentUD();
    const draft = ud.draft;
    if(!draft) return;
    const hasAnySet = draft.exercises.some(e=>e.sets.length>0);
    if(!hasAnySet && !confirm('Nie dodano żadnej serii. Zapisać pusty trening mimo to?')) return;
    draft.finishedAt = nowISO();
    ud.workouts.push(draft);
    ud.draft = null;
    save();
    showToast('Trening zapisany 💪');
    currentView = 'historia';
    renderApp();
  }

  /* =========================================================
     HISTORIA
     ========================================================= */
  function renderHistoria(){
    const ud = currentUD();
    const content = document.getElementById('content');
    const list = ud.workouts.slice().sort((a,b)=> (b.finishedAt||b.startedAt).localeCompare(a.finishedAt||a.startedAt));
    if(list.length===0){
      content.innerHTML = `<div class="section-title">Historia</div>
      <div class="empty-state"><div class="glyph">📅</div><h3>Brak treningów</h3><p>Twoje ukończone treningi pojawią się tutaj.</p></div>`;
      return;
    }
    content.innerHTML = `<div class="section-title">Historia <span class="faint" style="font-family:var(--font-body);font-size:12px;font-weight:600;">${list.length} treningów</span></div>` +
            list.map(w=>renderHistoryItem(w)).join('');
  }
  function renderHistoryItem(w){
    const isOpen = openHistoryIds.has(w.id);
    const setsCount = w.exercises.reduce((s,e)=>s+e.sets.length,0);
    const d = new Date(w.date+'T00:00:00');
    const dayNum = d.getDate();
    const monShort = d.toLocaleDateString('pl-PL',{month:'short'}).replace('.','');
    return `
  <div class="hist-item ${isOpen?'open':''}">
    <div class="hist-item-head" onclick="toggleHistory('${w.id}')">
      <div class="hist-date-badge">${dayNum}<br>${esc(monShort)}</div>
      <div class="hist-info">
        <b>${esc(w.label)}</b>
        <span>${w.exercises.length} ćwiczeń · ${setsCount} serii</span>
      </div>
      <svg class="hist-chevron" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="hist-body">
      ${w.exercises.map(e=>`
        <div class="hist-ex">
          <b>${esc(e.name)}</b>
          <div class="sets-line">${e.sets.length ? e.sets.map(s=>fmtNum(s.weight)+'kg × '+s.reps).join('  ·  ') : 'brak serii'}</div>
        </div>`).join('') || '<p class="muted">Brak ćwiczeń w tym treningu.</p>'}
      <div class="hist-del-row">
        <button class="btn btn-danger btn-sm" onclick="deleteWorkout('${w.id}')">Usuń trening</button>
      </div>
    </div>
  </div>`;
  }
  function toggleHistory(id){
    if(openHistoryIds.has(id)) openHistoryIds.delete(id); else openHistoryIds.add(id);
    renderHistoria();
  }
  function deleteWorkout(id){
    if(!confirm('Usunąć ten trening z historii?')) return;
    const ud = currentUD();
    ud.workouts = ud.workouts.filter(w=>w.id!==id);
    save();
    renderHistoria();
  }

  /* =========================================================
     PLANY
     ========================================================= */
  function renderPlany(){
    const ud = currentUD();
    const content = document.getElementById('content');
    const plans = ud.plans;
    content.innerHTML = `
    <div class="section-title">Plany treningowe
      <button class="btn btn-primary btn-sm" onclick="openPlanModal(null)">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke-width="2.5" stroke-linecap="round"/></svg>
        Nowy plan
      </button>
    </div>
    ${plans.length===0 ? `<div class="empty-state"><div class="glyph">📋</div><h3>Brak planów</h3><p>Utwórz plan (np. Trening A / B / C) ze stałą listą ćwiczeń, żeby szybciej rozpoczynać kolejne sesje — wystarczy wpisać serie, powtórzenia i obciążenie.</p></div>` : ''}
    ${plans.map((p,i)=>`
      <div class="plan-card">
        <div class="plan-card-head">
          <h3><span class="plate-dot ${plateClass(i)}"></span>${esc(p.name)}</h3>
          <div class="plan-card-actions">
            <button class="iconbtn" onclick="openPlanModal('${p.id}')" title="Edytuj">
              <svg viewBox="0 0 24 24" fill="none"><path d="M4 20l4-1 11-11-3-3L5 16l-1 4Z" stroke-width="2" stroke-linejoin="round"/></svg>
            </button>
            <button class="iconbtn danger" onclick="deletePlan('${p.id}')" title="Usuń">
              <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
        <div class="plan-ex-list">
          ${p.exercises.length ? p.exercises.map(e=>`<span class="chip">${esc(e.name)}</span>`).join('') : '<span class="faint">Brak ćwiczeń</span>'}
        </div>
      </div>`).join('')}
  `;
  }

  function openPlanModal(planId){
    const ud = currentUD();
    const existing = planId ? ud.plans.find(p=>p.id===planId) : null;
    planDraft = existing
            ? {id:existing.id, name:existing.name, exercises: existing.exercises.map(e=>({id:e.id, name:e.name}))}
            : {id:null, name:'', exercises:[]};
    openModal(renderPlanModalHTML());
    setTimeout(()=>{ const el=document.getElementById('plan-name-input'); if(el) el.focus(); }, 50);
  }
  function renderPlanModalHTML(){
    const rows = planDraft.exercises.map((e,i)=>`
    <div class="plan-ex-edit-row">
      <span class="plate-dot ${plateClass(i)}"></span>
      <input class="input" value="${esc(e.name)}" onchange="updatePlanExName(${i}, this.value)">
      <button class="iconbtn danger" onclick="removePlanExRow(${i})">
        <svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>`).join('');
    return `
    <div class="modal-head"><h3>${planDraft.id? 'Edytuj plan' : 'Nowy plan'}</h3>
      <button class="iconbtn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke-width="2.5" stroke-linecap="round"/></svg></button>
    </div>
    <div class="field">
      <label for="plan-name-input">Nazwa planu</label>
      <input id="plan-name-input" class="input" placeholder="np. Trening A" value="${esc(planDraft.name)}" oninput="planDraft.name=this.value">
    </div>
    <div class="field">
      <label>Ćwiczenia</label>
      <div id="plan-ex-rows">${rows || '<p class="faint">Brak ćwiczeń — dodaj pierwsze poniżej.</p>'}</div>
      <div class="add-ex-inline">
        <input id="plan-new-ex" class="input" placeholder="Nazwa ćwiczenia" onkeydown="if(event.key==='Enter'){event.preventDefault();addPlanExRow();}">
        <button class="btn btn-secondary" onclick="addPlanExRow()">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="savePlan()">Zapisz plan</button>
    ${planDraft.id ? `<button class="btn btn-danger btn-block" style="margin-top:8px;" onclick="deletePlan('${planDraft.id}');closeModal();">Usuń plan</button>` : ''}
  `;
  }
  function addPlanExRow(){
    const inp = document.getElementById('plan-new-ex');
    const name = inp.value.trim();
    if(!name) return;
    planDraft.exercises.push({id:uid(), name});
    openModal(renderPlanModalHTML());
    const el = document.getElementById('plan-new-ex'); if(el) el.focus();
  }
  function updatePlanExName(i, val){ planDraft.exercises[i].name = val; }
  function removePlanExRow(i){
    planDraft.exercises.splice(i,1);
    openModal(renderPlanModalHTML());
  }
  function savePlan(){
    const nameInput = document.getElementById('plan-name-input');
    if(nameInput) planDraft.name = nameInput.value;
    const name = planDraft.name.trim();
    if(!name){ if(nameInput) nameInput.focus(); return; }
    const ud = currentUD();
    const cleanExercises = planDraft.exercises.filter(e=>e.name.trim()).map(e=>({id:e.id, name:e.name.trim()}));
    if(planDraft.id){
      const p = ud.plans.find(p=>p.id===planDraft.id);
      p.name = name; p.exercises = cleanExercises;
    } else {
      ud.plans.push({id:uid(), name, exercises: cleanExercises});
    }
    save();
    closeModal();
    renderPlany();
    showToast('Plan zapisany');
  }
  function deletePlan(id){
    if(!confirm('Usunąć ten plan treningowy?')) return;
    const ud = currentUD();
    ud.plans = ud.plans.filter(p=>p.id!==id);
    save();
    renderPlany();
  }

  /* =========================================================
     STATYSTYKI
     ========================================================= */
  let statsSelectedExercise = null;

  function allExerciseNames(ud){
    const set = new Map(); // norm -> display name (most recent)
    const sorted = ud.workouts.slice().sort((a,b)=> (a.finishedAt||a.startedAt).localeCompare(b.finishedAt||b.startedAt));
    sorted.forEach(w=> w.exercises.forEach(e=>{
      if(e.sets.length===0) return;
      set.set(e.name.trim().toLowerCase(), e.name.trim());
    }));
    return Array.from(set.values()).sort((a,b)=>a.localeCompare(b,'pl'));
  }

  function renderStatystyki(){
    const ud = currentUD();
    const content = document.getElementById('content');
    const names = allExerciseNames(ud);

    if(!statsSelectedExercise || !names.includes(statsSelectedExercise)){
      statsSelectedExercise = names[0] || null;
    }

    const totalWorkouts = ud.workouts.length;
    const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate()-7);
    const thisWeek = ud.workouts.filter(w=> new Date(w.date+'T00:00:00') >= weekAgo).length;
    const totalVolume = ud.workouts.reduce((s,w)=> s + w.exercises.reduce((s2,e)=> s2 + e.sets.reduce((s3,st)=>s3+st.reps*st.weight,0),0), 0);

    let overview = `
    <div class="section-title">Statystyki</div>
    <div class="stat-grid">
      <div class="stat-box"><div class="num">${totalWorkouts}</div><div class="lbl">TRENINGÓW ŁĄCZNIE</div></div>
      <div class="stat-box"><div class="num">${thisWeek}</div><div class="lbl">W TYM TYGODNIU</div></div>
      <div class="stat-box"><div class="num">${Math.round(totalVolume/1000)}t</div><div class="lbl">CAŁKOWITY TONAŻ</div></div>
    </div>
  `;

    overview += `<div class="chart-card"><h4>Treningi w ostatnich 8 tygodniach</h4>${buildWeeklyBarChart(ud)}</div>`;

    if(names.length===0){
      content.innerHTML = overview + `<div class="empty-state"><div class="glyph">📈</div><h3>Za mało danych</h3><p>Ukończ przynajmniej jeden trening z zapisanymi seriami, żeby zobaczyć wykresy postępów.</p></div>`;
      return;
    }

    const options = names.map(n=>`<option value="${esc(n)}" ${n===statsSelectedExercise?'selected':''}>${esc(n)}</option>`).join('');

    const sessions = buildExerciseSessions(ud, statsSelectedExercise);

    content.innerHTML = overview + `
    <div class="field select-wrap" style="margin-top:18px;">
      <label>Postęp w ćwiczeniu</label>
      <select onchange="statsSelectedExercise=this.value; renderStatystyki();">${options}</select>
    </div>
    <div class="chart-card">
      <h4>Maksymalne obciążenie na sesji (kg)</h4>
      ${buildLineChart(sessions.map(s=>({x:s.label, y:s.maxWeight})))}
    </div>
    <div class="chart-card">
      <h4>Objętość treningowa na sesji (kg × powt.)</h4>
      ${buildBarChart(sessions.map(s=>({x:s.label, y:s.volume})))}
    </div>
    <div class="chart-card">
      <h4>Ostatnie sesje</h4>
      <table class="stat-table">
        <thead><tr><th>Data</th><th>Serie</th><th>Top set</th></tr></thead>
        <tbody>
          ${sessions.slice().reverse().slice(0,8).map(s=>`
            <tr><td>${esc(s.label)}</td><td>${s.setsSummary}</td><td>${fmtNum(s.topWeight)}kg × ${s.topReps}</td></tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  }

  function buildExerciseSessions(ud, name){
    const norm = name.trim().toLowerCase();
    const sorted = ud.workouts.slice().filter(w=>w.exercises.some(e=>e.name.trim().toLowerCase()===norm && e.sets.length>0))
            .sort((a,b)=> a.date.localeCompare(b.date));
    return sorted.map(w=>{
      const ex = w.exercises.find(e=>e.name.trim().toLowerCase()===norm);
      const maxWeight = Math.max(...ex.sets.map(s=>s.weight));
      const volume = ex.sets.reduce((s,st)=>s+st.reps*st.weight,0);
      const top = ex.sets.slice().sort((a,b)=> b.weight-a.weight)[0];
      return {
        label: formatShortDate(w.date),
        maxWeight, volume,
        topWeight: top.weight, topReps: top.reps,
        setsSummary: ex.sets.map(s=>fmtNum(s.weight)+'×'+s.reps).join(', ')
      };
    });
  }

  function buildWeeklyBarChart(ud){
    const weeks = [];
    const now = new Date();
    for(let i=7;i>=0;i--){
      const start = new Date(now); start.setDate(now.getDate() - now.getDay() - i*7 + 1);
      start.setHours(0,0,0,0);
      const end = new Date(start); end.setDate(start.getDate()+7);
      const count = ud.workouts.filter(w=>{ const d=new Date(w.date+'T00:00:00'); return d>=start && d<end; }).length;
      weeks.push({x: start.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}), y: count});
    }
    return buildBarChart(weeks, true);
  }

  /* ---- tiny SVG chart builders ---- */
  function buildLineChart(points){
    if(points.length===0) return `<div class="chart-empty">Brak danych do wyświetlenia</div>`;
    if(points.length===1) points = [{x:'',y:0}, points[0]];
    const w=320,h=140,padL=6,padR=6,padT=14,padB=22;
    const ys = points.map(p=>p.y);
    let minY = Math.min(...ys,0), maxY = Math.max(...ys,1);
    if(minY===maxY){ maxY = minY+1; }
    const stepX = (w-padL-padR) / (points.length-1);
    const coords = points.map((p,i)=>{
      const px = padL + stepX*i;
      const py = padT + (h-padT-padB) * (1 - (p.y-minY)/(maxY-minY));
      return {px, py, label:p.x, value:p.y};
    });
    const pathD = coords.map((c,i)=> (i===0?'M':'L')+c.px.toFixed(1)+' '+c.py.toFixed(1)).join(' ');
    const areaD = pathD + ` L ${coords[coords.length-1].px.toFixed(1)} ${h-padB} L ${coords[0].px.toFixed(1)} ${h-padB} Z`;
    const dots = coords.map(c=>`<circle cx="${c.px.toFixed(1)}" cy="${c.py.toFixed(1)}" r="3.4" fill="#e8432f" stroke="#1f232a" stroke-width="1.5"><title>${esc(c.label)}: ${fmtNum(c.value)}</title></circle>`).join('');
    const firstLbl = coords[0].label, lastLbl = coords[coords.length-1].label;
    return `
  <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="lg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8432f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8432f" stop-opacity="0"/>
    </linearGradient></defs>
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#333941" stroke-width="1"/>
    <path d="${areaD}" fill="url(#lg1)" stroke="none"/>
    <path d="${pathD}" fill="none" stroke="#e8432f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    <text x="${padL}" y="${h-6}" font-size="9" fill="#666c76" font-family="JetBrains Mono, monospace">${esc(firstLbl)}</text>
    <text x="${w-padR}" y="${h-6}" font-size="9" fill="#666c76" font-family="JetBrains Mono, monospace" text-anchor="end">${esc(lastLbl)}</text>
  </svg>`;
  }
  function buildBarChart(points, compact){
    if(points.length===0) return `<div class="chart-empty">Brak danych do wyświetlenia</div>`;
    const w=320,h=140,padL=6,padR=6,padT=14,padB=22;
    const ys = points.map(p=>p.y);
    const maxY = Math.max(...ys, 1);
    const n = points.length;
    const gap = 6;
    const barW = (w-padL-padR-gap*(n-1)) / n;
    const bars = points.map((p,i)=>{
      const x = padL + i*(barW+gap);
      const bh = (h-padT-padB) * (p.y/maxY);
      const y = h-padB-bh;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${p.y>0?'#2f7de1':'#272c34'}"><title>${esc(p.x)}: ${fmtNum(p.y)}</title></rect>`;
    }).join('');
    const showEvery = n>10 ? Math.ceil(n/6) : 1;
    const labels = points.map((p,i)=>{
      if(i % showEvery !== 0 && i !== n-1) return '';
      const x = padL + i*(barW+gap) + barW/2;
      return `<text x="${x.toFixed(1)}" y="${h-6}" font-size="8.5" fill="#666c76" font-family="JetBrains Mono, monospace" text-anchor="middle">${esc(p.x)}</text>`;
    }).join('');
    return `
  <svg class="chart-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="#333941" stroke-width="1"/>
    ${bars}
    ${labels}
  </svg>`;
  }

  /* ---------- init ---------- */
  boot();
</script>
</body>
</html>
